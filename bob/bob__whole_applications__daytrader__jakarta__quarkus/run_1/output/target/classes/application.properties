# DayTrader Quarkus Configuration

# Application Info
quarkus.application.name=daytrader-quarkus
quarkus.application.version=1.0-SNAPSHOT

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.ibm.websphere.samples.daytrader".level=DEBUG

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.test-port=8081

# ========================================
# Development Profile (%dev)
# ========================================
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:tradedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.sql-load-script=no-file

# Artemis in-JVM for dev
%dev.quarkus.artemis.embedded.enabled=true
%dev.quarkus.artemis.embedded.queues=TradeBrokerQueue
%dev.quarkus.artemis.embedded.topics=TradeStreamerTopic

# ========================================
# Test Profile (%test)
# ========================================
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false

# Artemis in-JVM for test
%test.quarkus.artemis.embedded.enabled=true
%test.quarkus.artemis.embedded.queues=TradeBrokerQueue
%test.quarkus.artemis.embedded.topics=TradeStreamerTopic

# ========================================
# Production Profile (%prod)
# ========================================
%prod.quarkus.datasource.db-kind=h2
%prod.quarkus.datasource.jdbc.url=${JDBC_URL:jdbc:h2:file:./data/tradedb;AUTO_SERVER=TRUE}
%prod.quarkus.datasource.username=${DB_USERNAME:sa}
%prod.quarkus.datasource.password=${DB_PASSWORD:}
%prod.quarkus.hibernate-orm.database.generation=update
%prod.quarkus.hibernate-orm.log.sql=false

# Artemis configuration for prod (will be configured when messaging is migrated)
%prod.quarkus.artemis.url=${ARTEMIS_URL:tcp://localhost:61616}
%prod.quarkus.artemis.username=${ARTEMIS_USERNAME:admin}
%prod.quarkus.artemis.password=${ARTEMIS_PASSWORD:admin}

# ========================================
# JPA/Hibernate Configuration
# ========================================
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
quarkus.hibernate-orm.jdbc.statement-batch-size=20
quarkus.hibernate-orm.fetch.batch-size=16

# ========================================
# Transaction Configuration
# ========================================
quarkus.transaction-manager.default-transaction-timeout=300s

# ========================================
# REST Configuration
# ========================================
quarkus.rest.path=/api
quarkus.rest-jackson.serialization-inclusion=non-null

# ========================================
# Health Check Configuration
# ========================================
quarkus.health.extensions.enabled=true
quarkus.smallrye-health.root-path=/health

# ========================================
# Reactive Messaging Channels
# ========================================
# Trade Broker Queue (for order processing)
mp.messaging.outgoing.trade-broker-queue.connector=smallrye-in-memory
mp.messaging.incoming.trade-broker-queue.connector=smallrye-in-memory

# Trade Streamer Topic (for quote price updates)
mp.messaging.outgoing.trade-streamer-topic.connector=smallrye-in-memory
mp.messaging.incoming.trade-streamer-topic.connector=smallrye-in-memory
mp.messaging.incoming.trade-streamer-topic.broadcast=true

# ========================================
# WebSocket Configuration
# ========================================
quarkus.websockets-next.server.auto-ping-interval=30s

# ========================================
# Scheduler Configuration
# ========================================
quarkus.scheduler.enabled=true

# ========================================
# Build Configuration
# ========================================
quarkus.package.jar.type=uber-jar

