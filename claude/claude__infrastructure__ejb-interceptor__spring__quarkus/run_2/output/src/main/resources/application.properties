# Quarkus Configuration for Interceptor Example Application

# Application name
quarkus.application.name=interceptor

# HTTP configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# JSF/MyFaces configuration
quarkus.myfaces.project-stage=Development
quarkus.myfaces.state-saving-method=server

# CDI configuration
quarkus.arc.remove-unused-beans=false

# Logging configuration
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Development mode settings
quarkus.live-reload.instrumentation=true
