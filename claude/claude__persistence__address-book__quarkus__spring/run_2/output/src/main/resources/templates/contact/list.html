<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>List Contacts</title>
    <link rel="stylesheet" th:href="@{/css/jsfcrud.css}"/>
</head>
<body>
    <h1>List</h1>

    <div th:if="${message}" style="color: green;">
        <p th:text="${message}"></p>
    </div>

    <p th:if="${#lists.isEmpty(contacts)}">(No Contact Items Found)</p>

    <div th:if="${!#lists.isEmpty(contacts)}">
        <p>
            Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">1</span>
            (<span th:text="${totalItems}">0</span> total items)
            &nbsp;
            <a th:if="${hasPrevious}" th:href="@{/contacts(page=${currentPage - 1})}">Previous</a>
            &nbsp;
            <a th:if="${hasNext}" th:href="@{/contacts(page=${currentPage + 1})}">Next</a>
        </p>
        <table border="0" cellpadding="2" cellspacing="0" rules="all" style="border:solid 1px" class="jsfcrud_list_form">
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Last Name</th>
                    <th>First Name</th>
                    <th>Birthday</th>
                    <th>Home Phone</th>
                    <th>Mobile Phone</th>
                    <th>Email</th>
                    <th>&nbsp;</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item, stat : ${contacts}" th:class="${stat.odd} ? 'jsfcrud_odd_row' : 'jsfcrud_even_row'">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.lastName}"></td>
                    <td th:text="${item.firstName}"></td>
                    <td th:text="${item.birthday != null} ? ${#dates.format(item.birthday, 'MM/dd/yyyy')} : ''"></td>
                    <td th:text="${item.homePhone}"></td>
                    <td th:text="${item.mobilePhone}"></td>
                    <td th:text="${item.email}"></td>
                    <td>
                        <a th:href="@{/contacts/{id}(id=${item.id})}">View</a>
                        <a th:href="@{/contacts/{id}/edit(id=${item.id})}">Edit</a>
                        <form th:action="@{/contacts/{id}/delete(id=${item.id})}" method="post" style="display:inline;">
                            <button type="submit" style="background:none;border:none;color:black;cursor:pointer;text-decoration:underline;font-size:small;">Destroy</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <br/>
    <a th:href="@{/contacts/create}">Create New Contact</a>
    <br/><br/>
    <a th:href="@{/}">Index</a>
</body>
</html>
