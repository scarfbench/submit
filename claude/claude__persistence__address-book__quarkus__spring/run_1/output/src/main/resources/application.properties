# Spring Boot Application Configuration
# Migrated from Quarkus application.properties

# Server Configuration
server.port=8080

# H2 Database Configuration (same as original)
spring.datasource.url=jdbc:h2:mem:addressbook;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false

# Jackson date format for REST API
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC
