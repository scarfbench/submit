# =============================================
# Quarkus Kitchen Service Configuration
# =============================================

quarkus.rest.path=/api
quarkus.http.port=8080

# =============================================
# Kafka / Reactive Messaging Configuration
# =============================================
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}

# Incoming: kitchen commands
mp.messaging.incoming.kitchen.connector=smallrye-kafka
mp.messaging.incoming.kitchen.topic=kitchen-commands
mp.messaging.incoming.kitchen.group.id=kitchen-service
mp.messaging.incoming.kitchen.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Outgoing: order updates
mp.messaging.outgoing.order-updates.connector=smallrye-kafka
mp.messaging.outgoing.order-updates.topic=order-updates
mp.messaging.outgoing.order-updates.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka health check disabled (allows standalone startup without Kafka)
quarkus.kafka.health.enabled=false
quarkus.reactive-messaging.health.enabled=false
