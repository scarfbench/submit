# =============================
# Quarkus Coffee Shop Configuration
# =============================

# HTTP
quarkus.http.port=8080

# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:coffeeshop}
quarkus.datasource.username=${DB_USER:cafe}
quarkus.datasource.password=${DB_PASSWORD:cafe}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Health check config
quarkus.datasource.health.enabled=false
quarkus.health.extensions.enabled=true

# --- Kafka: Reactive Messaging (SmallRye) ---
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}

# Outgoing: barista-commands
mp.messaging.outgoing.barista.connector=smallrye-kafka
mp.messaging.outgoing.barista.topic=barista-commands
mp.messaging.outgoing.barista.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Outgoing: kitchen-commands
mp.messaging.outgoing.kitchen.connector=smallrye-kafka
mp.messaging.outgoing.kitchen.topic=kitchen-commands
mp.messaging.outgoing.kitchen.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Incoming: order-updates
mp.messaging.incoming.order-updates.connector=smallrye-kafka
mp.messaging.incoming.order-updates.topic=order-updates
mp.messaging.incoming.order-updates.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-updates.group.id=orders-service
mp.messaging.incoming.order-updates.auto.offset.reset=latest
mp.messaging.incoming.order-updates.failure-strategy=ignore

# Incoming: barista (barista-commands)
mp.messaging.incoming.barista-in.connector=smallrye-kafka
mp.messaging.incoming.barista-in.topic=barista-commands
mp.messaging.incoming.barista-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.barista-in.auto.offset.reset=latest
mp.messaging.incoming.barista-in.group.id=barista-service-dev

# Incoming: kitchen (kitchen-commands)
mp.messaging.incoming.kitchen-in.connector=smallrye-kafka
mp.messaging.incoming.kitchen-in.topic=kitchen-commands
mp.messaging.incoming.kitchen-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.kitchen-in.group.id=kitchen-service

# Outgoing: order-updates from barista
mp.messaging.outgoing.barista-order-updates.connector=smallrye-kafka
mp.messaging.outgoing.barista-order-updates.topic=order-updates
mp.messaging.outgoing.barista-order-updates.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Outgoing: order-updates from kitchen
mp.messaging.outgoing.kitchen-order-updates.connector=smallrye-kafka
mp.messaging.outgoing.kitchen-order-updates.topic=order-updates
mp.messaging.outgoing.kitchen-order-updates.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Graceful Kafka startup (don't fail if Kafka isn't available)
quarkus.kafka.health.enabled=false
mp.messaging.outgoing.barista.health-readiness-enabled=false
mp.messaging.outgoing.kitchen.health-readiness-enabled=false
mp.messaging.incoming.order-updates.health-readiness-enabled=false
mp.messaging.incoming.barista-in.health-readiness-enabled=false
mp.messaging.incoming.kitchen-in.health-readiness-enabled=false
mp.messaging.outgoing.barista-order-updates.health-readiness-enabled=false
mp.messaging.outgoing.kitchen-order-updates.health-readiness-enabled=false

# Static resources served from META-INF/resources
quarkus.http.enable-compression=true

# JAX-RS application path
quarkus.rest.path=/api
