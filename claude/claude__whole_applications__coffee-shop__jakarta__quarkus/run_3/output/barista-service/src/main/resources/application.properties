# Quarkus HTTP
quarkus.http.port=8080

# Kafka bootstrap
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}

# --- incoming: barista commands ---
mp.messaging.incoming.barista.connector=smallrye-kafka
mp.messaging.incoming.barista.topic=barista-commands
mp.messaging.incoming.barista.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.barista.auto.offset.reset=latest
mp.messaging.incoming.barista.group.id=barista-service-dev
mp.messaging.incoming.barista.failure-strategy=ignore
mp.messaging.incoming.barista.lazy-client=true
mp.messaging.incoming.barista.retry=true
mp.messaging.incoming.barista.retry.max-wait=60
mp.messaging.incoming.barista.health-readiness-enabled=false

# --- outgoing: order updates ---
mp.messaging.outgoing.order-updates.connector=smallrye-kafka
mp.messaging.outgoing.order-updates.topic=order-updates
mp.messaging.outgoing.order-updates.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.order-updates.lazy-client=true
mp.messaging.outgoing.order-updates.health-readiness-enabled=false

# Health check
quarkus.smallrye-health.root-path=/health
quarkus.kafka.health.enabled=false
quarkus.messaging.kafka.health.enabled=false
