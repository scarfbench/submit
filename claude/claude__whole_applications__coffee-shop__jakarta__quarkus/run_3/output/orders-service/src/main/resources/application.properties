# Quarkus HTTP
quarkus.http.port=8080

# Index the common module so Quarkus discovers its validation annotations / JPA types
quarkus.index-dependency.common.group-id=com.coffeeshop
quarkus.index-dependency.common.artifact-id=common

# ===== Default: H2 in-memory (standalone/testing) =====
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:coffeeshop;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# ===== "pg" profile: PostgreSQL (activate with -Dquarkus.profile=pg) =====
%pg.quarkus.datasource.db-kind=postgresql
%pg.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:coffeeshop}
%pg.quarkus.datasource.username=${DB_USER:cafe}
%pg.quarkus.datasource.password=${DB_PASSWORD:cafe}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Kafka bootstrap
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}

# --- outgoing: barista commands ---
mp.messaging.outgoing.barista.connector=smallrye-kafka
mp.messaging.outgoing.barista.topic=barista-commands
mp.messaging.outgoing.barista.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.barista.lazy-client=true

# --- outgoing: kitchen commands ---
mp.messaging.outgoing.kitchen.connector=smallrye-kafka
mp.messaging.outgoing.kitchen.topic=kitchen-commands
mp.messaging.outgoing.kitchen.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.kitchen.lazy-client=true

# --- incoming: order updates ---
mp.messaging.incoming.order-updates.connector=smallrye-kafka
mp.messaging.incoming.order-updates.topic=order-updates
mp.messaging.incoming.order-updates.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-updates.group.id=orders-service
mp.messaging.incoming.order-updates.auto.offset.reset=latest
mp.messaging.incoming.order-updates.failure-strategy=ignore
mp.messaging.incoming.order-updates.lazy-client=true
mp.messaging.incoming.order-updates.retry=true
mp.messaging.incoming.order-updates.retry.max-wait=60

# Health check - serve at /health (under non-application root /)
quarkus.http.non-application-root-path=/
quarkus.smallrye-health.root-path=health

# Disable ALL SmallRye Reactive Messaging health checks (liveness, readiness, startup)
# so that Kafka unavailability does not mark the app DOWN
smallrye.messaging.health.channel-enabled=false
mp.messaging.incoming.order-updates.health-enabled=false
mp.messaging.outgoing.barista.health-enabled=false
mp.messaging.outgoing.kitchen.health-enabled=false
quarkus.kafka.health.enabled=false
