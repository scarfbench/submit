<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <meta charset="UTF-8" />
    <title>Async Mail Demo</title>
</h:head>

<h:body>
    <h2>Send email</h2>
    <h:form>
        <h:outputLabel for="email" value="Send email to:" />
        <h:inputText id="email"
                     value="#{mailerManagedBean.email}"
                     required="true"
                     requiredMessage="Email is required" />
        <h:commandButton value="Send email" action="#{mailerManagedBean.send}" />
    </h:form>
    <div>
        <strong>Status:</strong>
        <h:outputText value="#{mailerManagedBean.status}" />
    </div>
    <p>
        <h:link outcome="response" value="Refresh" />
    </p>
</h:body>

</html>
