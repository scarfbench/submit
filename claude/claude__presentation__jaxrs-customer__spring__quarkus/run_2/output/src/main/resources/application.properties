# Quarkus HTTP Configuration
quarkus.http.root-path=/webapi
quarkus.http.port=8080

# JSF/MyFaces Configuration
quarkus.myfaces.faces-servlet.url-mappings=*.xhtml,/faces/*
quarkus.myfaces.project-stage=Development

# H2 Database Configuration
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:customer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect

# REST Client Configuration
quarkus.rest-client.customer-api.url=http://localhost:8080/webapi/Customer

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."spring.tutorial.customer".level=INFO
