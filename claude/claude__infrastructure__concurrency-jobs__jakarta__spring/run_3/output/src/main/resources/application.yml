server:
  port: 9080
  servlet:
    context-path: /jobs
    session:
      timeout: 30m

spring:
  application:
    name: jobs
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
  mvc:
    view:
      prefix: /
      suffix: .html

# Thread pool configuration for high and low priority executors
executor:
  high-priority:
    core-pool-size: 10
    max-pool-size: 20
    queue-capacity: 100
  low-priority:
    core-pool-size: 1
    max-pool-size: 5
    queue-capacity: 50

logging:
  level:
    com.spring.tutorial.concurrency.jobs: INFO
    org.springframework: INFO
