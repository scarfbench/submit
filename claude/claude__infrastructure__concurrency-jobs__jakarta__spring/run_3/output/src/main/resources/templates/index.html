<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs Client</title>
    <link rel="stylesheet" th:href="@{/css/default.css}">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: auto auto;
            gap: 10px;
            max-width: 500px;
            margin: 20px 0;
        }
        .form-grid label {
            text-align: right;
            padding-right: 10px;
        }
        .form-grid input {
            padding: 5px;
        }
        .form-grid button {
            grid-column: 2;
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        .form-grid button:hover {
            background-color: #0056b3;
        }
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h1>Submit High and Low Priority Jobs</h1>
    <p>Use a token to submit High Priority jobs (submit multiple jobs concurrently).</p>
    <p>Use no token to submit Low Priority jobs (submit one job every 10 seconds).</p>
    <p>Get a token <a href="http://localhost:9080/jobs/webapi/JobService/token" target="_blank">here</a>.</p>

    <div th:if="${message}" th:class="'message ' + ${messageType}">
        <span th:text="${message}"></span>
    </div>

    <form action="/submit" method="post">
        <div class="form-grid">
            <label for="jobID">Enter a Job ID:</label>
            <input type="number" id="jobID" name="jobID" value="0" required>

            <label for="token">Enter a Token:</label>
            <input type="text" id="token" name="token" value="" size="35">

            <button type="submit">Submit Job</button>
        </div>
    </form>
</body>
</html>
