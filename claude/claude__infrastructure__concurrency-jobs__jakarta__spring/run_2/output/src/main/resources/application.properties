# Spring Boot Application Configuration
# Migrated from Jakarta EE to Spring Boot

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=jobs

# Logging Configuration
logging.level.root=INFO
logging.level.jakarta.tutorial.concurrency.jobs=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Thread Pool Configuration (informational - actual config in JobsApplication.java)
# High Priority Executor: core=5, max=10, keepAlive=60s
# Low Priority Executor: core=2, max=4, keepAlive=60s
