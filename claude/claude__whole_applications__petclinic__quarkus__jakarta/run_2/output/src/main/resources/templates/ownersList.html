<h2>Owners</h2>

<table id="owners" class="table table-striped">
    <thead>
        <tr>
            <th style="width: 150px;" th:text="${msg.name}">Name</th>
            <th style="width: 200px;" th:text="${msg.address}">Address</th>
            <th>City</th>
            <th style="width: 120px" th:text="${msg.telephone}">Telephone</th>
            <th th:text="${msg.pets}">Pets</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="owner : ${owners}">
            <td>
                <a th:href="'/petclinic/owners/' + ${owner.id}" th:text="${owner.firstName + ' ' + owner.lastName}">Name</a>
            </td>
            <td th:text="${owner.address}">Address</td>
            <td th:text="${owner.city}">City</td>
            <td th:text="${owner.telephone}">Phone</td>
            <td>
                <span th:each="pet : ${owner.pets}" th:text="${pet.name + ' '}">Pet</span>
            </td>
        </tr>
    </tbody>
</table>
