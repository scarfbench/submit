<h2>
    <span th:if="${visit == null}" th:text="${msg.new_}">New</span>
    <span th:text="${msg.visit}">Visit</span>
</h2>

<b>Pet</b>
<table class="table table-striped">
    <thead>
        <tr>
            <th th:text="${msg.name}">Name</th>
            <th th:text="${msg.birthdate}">Birthdate</th>
            <th th:text="${msg.type}">Type</th>
            <th th:text="${msg.owner}">Owner</th>
        </tr>
    </thead>
    <tr>
        <td th:text="${pet.name}">Pet name</td>
        <td th:text="${pet.birthDate}">Date</td>
        <td th:text="${pet.type != null ? pet.type.name : ''}">Type</td>
        <td th:text="${pet.owner.firstName + ' ' + pet.owner.lastName}">Owner</td>
    </tr>
</table>

<form class="form-horizontal" method="post">
    <div class="form-group has-feedback">

        <div class="form-group" th:classappend="${errors != null and errors.containsKey('date')} ? 'has-error' : ''">
            <label class="col-sm-2 control-label" th:text="${msg.date}">Date</label>
            <div class="col-sm-10">
                <div>
                    <input class="form-control" type="text" placeholder="YYYY-MM-DD"
                           id="date" name="date" th:value="${visit != null ? visit.date : ''}"/>
                </div>
                <span th:if="${errors != null and errors.containsKey('date')}"
                      class="help-inline" th:text="${errors.get('date')}">Error</span>
            </div>
        </div>

        <div class="form-group" th:classappend="${errors != null and errors.containsKey('description')} ? 'has-error' : ''">
            <label class="col-sm-2 control-label" th:text="${msg.description}">Description</label>
            <div class="col-sm-10">
                <div>
                    <input class="form-control" type="text" id="description" name="description"
                           th:value="${visit != null ? visit.description : ''}" />
                </div>
                <span th:if="${errors != null and errors.containsKey('description')}"
                      class="help-inline" th:text="${errors.get('description')}">Error</span>
            </div>
        </div>

    </div>

    <div class="form-group">
        <div class="col-sm-offset-2 col-sm-10">
            <input type="hidden" name="petId" value="1" />
            <button class="btn btn-primary" type="submit" th:text="${msg.add_visit}">Add Visit</button>
        </div>
    </div>
</form>

<br />
<b th:text="${msg.previous_visits}">Previous Visits</b>
<table class="table table-striped">
    <tr>
        <th th:text="${msg.date}">Date</th>
        <th th:text="${msg.description}">Description</th>
    </tr>
    <tr th:if="${visit != null}" th:each="v : ${pet.sortedVisits}">
        <td th:text="${v.date}">Date</td>
        <td th:text="${v.description}">Description</td>
    </tr>
</table>
