<h2 th:text="${msg.find_owners}">Find Owners</h2>

<form action="/petclinic/owners" method="get" class="form-horizontal" id="search-owner-form">
    <div class="form-group">
        <div class="control-group" id="lastNameGroup">
            <label class="col-sm-2 control-label" th:text="${msg.last_name}">Last Name</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" id="lastName" name="lastName" size="30" maxlength="80" />
                <div th:if="${errors != null and #lists.size(errors) > 0}">
                    <span class="help-inline">
                        <div>
                            <p th:each="err : ${errors}" th:text="${err}"></p>
                        </div>
                    </span>
                </div>
            </div>
        </div>
    </div>
    <div class="form-group">
        <div class="col-sm-offset-2 col-sm-10">
            <button type="submit" class="btn btn-primary" th:text="${msg.find_owner}">Find Owner</button>
        </div>
    </div>
    <a class="btn btn-primary" href="/petclinic/owners/new" th:text="${msg.add_owner}">Add Owner</a>
</form>
