# Spring Boot Task Creator Application Configuration

# Server configuration
server.port=8080
server.servlet.context-path=/

# Logging configuration
logging.level.root=INFO
logging.level.jakarta.tutorial.taskcreator=INFO

# Jersey configuration for JAX-RS
spring.jersey.application-path=/api

# Thread pool configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25
spring.task.execution.thread-name-prefix=task-executor-

spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=task-scheduler-
