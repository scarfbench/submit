<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Async Mail - Response</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }
        button {
            margin: 5px;
            padding: 10px 20px;
        }
        a {
            text-decoration: none;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <h1>Async Mail - Response</h1>
    <div class="status">
        <strong>Status:</strong> <span th:text="${status}">No status available</span>
    </div>
    <form th:action="@{/response}" method="get">
        <button type="submit">Refresh</button>
    </form>
    <div>
        <a th:href="@{/}">Back to Home</a>
    </div>
</body>
</html>
