# Quarkus Configuration for Jobs Application

# HTTP Configuration
quarkus.http.port=9080
quarkus.http.host=0.0.0.0

# Application Configuration
quarkus.application.name=jobs

# JSF/Faces Configuration
quarkus.faces.project-stage=Development
quarkus.faces.welcome-files=index.xhtml
quarkus.faces.servlet-mapping=*.xhtml

# REST Configuration
quarkus.rest.path=/webapi

# Managed Executor Service - High Priority
quarkus.thread-pool.high-priority.core-threads=5
quarkus.thread-pool.high-priority.max-threads=10
quarkus.thread-pool.high-priority.keep-alive-time=60s

# Managed Executor Service - Low Priority
quarkus.thread-pool.low-priority.core-threads=2
quarkus.thread-pool.low-priority.max-threads=4
quarkus.thread-pool.low-priority.keep-alive-time=60s

# Logging
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n

# Build properties
quarkus.package.type=jar
