# Quarkus Configuration
# Migrated from Jakarta EE on Open Liberty

# Application name
quarkus.application.name=jobs

# HTTP configuration
quarkus.http.port=9080
quarkus.http.host=0.0.0.0

# REST configuration
quarkus.http.root-path=/
quarkus.resteasy-reactive.path=/webapi

# Logging configuration
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n

# Thread pool configuration for managed executors
# High priority executor configuration
quarkus.thread-pool.max-threads=10
quarkus.thread-pool.core-threads=5

# Development mode
%dev.quarkus.http.port=9080
%dev.quarkus.log.level=INFO

# Production mode
%prod.quarkus.log.level=INFO
