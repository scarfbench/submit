# Quarkus Configuration for Jobs Application

# HTTP Port Configuration
quarkus.http.port=8080

# Development mode
quarkus.http.cors=true

# JSF Configuration
quarkus.faces.project-stage=Development
quarkus.faces.welcome-files=index.xhtml

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."jakarta.tutorial".level=INFO

# Thread pool configuration (simulating ManagedExecutorService behavior)
# These are handled in code via ExecutorService

# Session timeout (30 minutes)
quarkus.servlet.context-path=/
