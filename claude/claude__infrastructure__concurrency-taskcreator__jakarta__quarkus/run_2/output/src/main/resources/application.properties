# Quarkus Configuration for TaskCreator Application

# HTTP Configuration
quarkus.http.port=9080
quarkus.http.host=0.0.0.0

# Application name
quarkus.application.name=taskcreator

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."jakarta.tutorial.taskcreator".level=INFO

# WebSocket Configuration
quarkus.websocket.enabled=true

# Package configuration
quarkus.package.type=uber-jar

# Development mode settings
%dev.quarkus.http.port=9080

# JSF/MyFaces Configuration
quarkus.myfaces.project-stage=Development
quarkus.myfaces.faces-servlet.url-patterns=*.xhtml,/faces/*
quarkus.http.root-path=/
