# Quarkus Configuration for TaskCreator Application
# Migrated from Jakarta EE / Open Liberty

# HTTP Configuration
quarkus.http.port=9080
quarkus.http.host=0.0.0.0

# Application Configuration
quarkus.application.name=taskcreator

# Logging Configuration
quarkus.log.console.enable=true
quarkus.log.console.level=INFO
quarkus.log.category."jakarta.tutorial.taskcreator".level=INFO

# Context root (root path like Liberty deployment)
quarkus.http.root-path=/

# JSF/MyFaces Configuration
# MyFaces configuration via context-param in web.xml

# WebSocket Configuration
quarkus.websocket.server.max-frame-size=65536

# Thread Pool Configuration (replacing ManagedExecutorService)
quarkus.thread-pool.core-threads=10
quarkus.thread-pool.max-threads=50
quarkus.thread-pool.queue-size=100
