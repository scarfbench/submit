# Quarkus Configuration for Task Creator Application

# HTTP port configuration
quarkus.http.port=9080

# Application name
quarkus.application.name=taskcreator

# Context root
quarkus.http.root-path=/

# Logging configuration
quarkus.log.console.level=INFO
quarkus.log.category."jakarta.tutorial.taskcreator".level=INFO

# MyFaces/JSF Configuration
quarkus.myfaces.project-stage=Development

# WebSocket configuration
quarkus.websocket.max-frame-size=65536

# Enable all endpoints
quarkus.http.cors=false

# Session timeout (in minutes)
quarkus.http.session.timeout=30M
