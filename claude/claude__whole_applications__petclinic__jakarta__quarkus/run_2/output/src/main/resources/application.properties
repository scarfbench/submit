# Quarkus Application Configuration
quarkus.application.name=petclinic-quarkus

# HTTP Configuration
quarkus.http.port=8080
quarkus.rest.path=/rest

# Datasource Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=petclinic_jakartaee
quarkus.datasource.password=petclinic_jakartaeepwd
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/petclinic_jakartaee_liberty

# Hibernate ORM Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.woehlke".level=INFO
quarkus.log.category."org.hibernate.SQL".level=DEBUG

# Jackson JSON serialization
quarkus.jackson.fail-on-unknown-properties=false
quarkus.jackson.serialization-inclusion=non-null
