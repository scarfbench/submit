# Quarkus PetClinic Configuration

# Datasource configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=petclinic_jakartaee
quarkus.datasource.password=petclinic_jakartaeepwd
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/petclinic_jakartaee_liberty
quarkus.datasource.jdbc.max-size=16

# Hibernate ORM configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=import.sql

# HTTP configuration
quarkus.http.port=8080

# Jackson configuration
quarkus.jackson.write-dates-as-timestamps=false

# Health check
quarkus.health.extensions.enabled=true
