# Jakarta EE Configuration for JAX-RS Customer Application

# Database Configuration - H2 In-Memory
jakarta.persistence.jdbc.driver=org.h2.Driver
jakarta.persistence.jdbc.url=jdbc:h2:mem:customer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
jakarta.persistence.jdbc.user=sa
jakarta.persistence.jdbc.password=

# Hibernate Configuration
jakarta.persistence.schema-generation.database.action=drop-and-create
hibernate.show_sql=true
hibernate.format_sql=true
hibernate.dialect=org.hibernate.dialect.H2Dialect

# Application Configuration
customer.api.url=http://localhost:8080/jaxrs-customer/webapi

# Logging Configuration
.level=INFO
quarkus.tutorial.customer.level=FINE
