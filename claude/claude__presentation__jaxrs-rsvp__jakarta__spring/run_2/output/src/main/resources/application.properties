# Spring Boot Application Configuration

# Application name
spring.application.name=rsvp

# Server configuration
server.port=8080
server.servlet.context-path=/jaxrs-rsvp-10-SNAPSHOT

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:rsvpdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson XML/JSON configuration
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.jakarta.tutorial.rsvp=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# Jersey Configuration
spring.jersey.application-path=/webapi
