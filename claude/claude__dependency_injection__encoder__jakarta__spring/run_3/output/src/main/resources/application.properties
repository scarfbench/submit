# Spring Boot Application Configuration
spring.application.name=encoder

# Server configuration
server.port=8080
server.servlet.context-path=/encoder

# JSF/View configuration (Note: JSF is not natively supported in Spring)
# This application originally used JSF which requires significant refactoring for Spring
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Session timeout (in seconds)
server.servlet.session.timeout=30m

# Logging
logging.level.jakarta.tutorial.encoder=INFO
