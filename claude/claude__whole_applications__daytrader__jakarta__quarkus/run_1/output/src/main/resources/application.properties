# Quarkus DayTrader Configuration
quarkus.application.name=daytrader

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.root-path=/

# Datasource Configuration (H2)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:tradedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
quarkus.hibernate-orm.jdbc.timezone=UTC

# Jackson JSON serialization
quarkus.jackson.fail-on-unknown-properties=false

# Health check
quarkus.smallrye-health.root-path=/q/health

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.ibm.websphere.samples.daytrader".level=INFO

# Import SQL on start
quarkus.hibernate-orm.sql-load-script=import.sql
