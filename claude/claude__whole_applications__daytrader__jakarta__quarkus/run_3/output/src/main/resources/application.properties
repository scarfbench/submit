# Quarkus DayTrader Configuration
# Migrated from OpenLiberty server.xml

# HTTP Configuration
quarkus.http.port=8080

# Datasource Configuration (H2)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:tradedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=LEGACY
quarkus.datasource.username=db_username
quarkus.datasource.password=db_password

# Hibernate ORM Configuration (replaces persistence.xml)
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
quarkus.hibernate-orm.jdbc.timezone=UTC
quarkus.hibernate-orm.packages=com.ibm.websphere.samples.daytrader.entities

# Transaction timeout
quarkus.transaction-manager.default-transaction-timeout=300

# Application context path - originally /daytrader
quarkus.http.root-path=/daytrader

# Quarkus REST path (JAX-RS Application path was /rest)
quarkus.resteasy-reactive.path=/rest

# Non-application endpoints (health, metrics etc)
# Use absolute path so health is at /q/health (outside the app root)
quarkus.http.non-application-root-path=/q

# Health and readiness
quarkus.smallrye-health.root-path=health

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.ibm.websphere.samples.daytrader".level=INFO

# Jackson serialization
quarkus.jackson.fail-on-unknown-properties=false
quarkus.jackson.serialization-inclusion=non-null

# Banner
quarkus.banner.enabled=true
