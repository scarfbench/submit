# Quarkus DayTrader Application Configuration

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.root-path=/

# Datasource Configuration (H2 embedded)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:tradedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=100

# Hibernate ORM Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=import.sql

# Jackson Configuration
quarkus.jackson.serialization-inclusion=non-null

# Health Check
quarkus.health.extensions.enabled=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.ibm.websphere.samples.daytrader".level=INFO
quarkus.log.console.enable=true
