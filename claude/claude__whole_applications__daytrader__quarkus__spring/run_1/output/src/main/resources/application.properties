# Spring Boot Application Configuration
# Migrated from Quarkus application.properties

spring.application.name=daytrader
server.port=9080

# Database Configuration
spring.datasource.url=jdbc:h2:mem:tradedb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=true

# Trade Application Configuration
trade.runtime-mode=EJB3
trade.order-processing-mode=SYNCH
trade.max-users=50
trade.max-quotes=100
trade.db.populate.on.startup=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false

# Logging
logging.level.com.ibm.websphere.samples.daytrader=INFO
