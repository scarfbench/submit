# Spring Boot Application Configuration
spring.application.name=daytrader

# HTTP port
server.port=9080
server.servlet.context-path=/

# ===========================================
# Database Configuration
# ===========================================
spring.datasource.url=jdbc:h2:mem:tradedb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=true

# ===========================================
# REST Configuration
# ===========================================
# Spring MVC base path for REST controllers
spring.mvc.servlet.path=/rest

# ===========================================
# Trade Application Configuration
# ===========================================
trade.runtime-mode=EJB3
trade.order-processing-mode=SYNCH
trade.max-users=50
trade.max-quotes=100

# Database population on startup
trade.db.populate.on.startup=true

# ===========================================
# Actuator (Health checks)
# ===========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===========================================
# Jackson Configuration
# ===========================================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=true
