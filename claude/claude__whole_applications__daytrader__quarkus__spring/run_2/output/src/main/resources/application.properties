# Spring Boot Application Configuration for DayTrader
# This replaces the Quarkus configuration

# Server Configuration
server.port=9080
server.servlet.context-path=/

# Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:tradedb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# H2 Console (for debugging)
spring.h2.console.enabled=true

# Trade Application Configuration
trade.runtime-mode=EJB3
trade.order-processing-mode=SYNCH
trade.max-users=50
trade.max-quotes=100
trade.db.populate.on.startup=true

# Jackson Configuration
spring.jackson.serialization.fail-on-empty-beans=false
