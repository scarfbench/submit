<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer - An EJB timer service session bean example (Migrated to Quarkus)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            color: #333;
        }
        .info {
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
        }
        .primary-btn {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .primary-btn:hover {
            background-color: #0056b3;
        }
        .secondary-btn {
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .secondary-btn:hover {
            background-color: #545b62;
        }
    </style>
</head>
<body>
    <h1>Timer Page</h1>

    <div class="info">
        <p>The last programmatic timeout was: <strong>{lastProgrammaticTimeout}</strong></p>
        <p>The last automatic timeout was: <strong>{lastAutomaticTimeout}</strong></p>
    </div>

    <div>
        <p>Set a programmatic timer here.</p>
        <form method="post" action="/setTimer">
            <button type="submit" class="primary-btn">Set Timer</button>
        </form>
        <form method="get" action="/">
            <button type="submit" class="secondary-btn">Refresh</button>
        </form>
    </div>

    <footer style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #ccc;">
        <p><em>Migrated from Jakarta EE to Quarkus</em></p>
    </footer>
</body>
</html>
