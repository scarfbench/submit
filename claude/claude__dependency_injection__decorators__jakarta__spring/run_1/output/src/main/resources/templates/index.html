<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decorated String Encoder</title>
    <style>
        body {
            font-family: Arial, Verdana, Helvetica, sans-serif;
            background-color: #FFFFCC;
            margin: 20px;
        }
        h2 {
            color: #333;
        }
        form {
            margin-top: 20px;
        }
        input[type="text"] {
            margin-right: 10px;
            padding: 5px;
        }
        input[type="submit"] {
            padding: 5px 15px;
            margin-right: 10px;
        }
        .result {
            color: blue;
            font-weight: bold;
        }
        .error {
            color: #d20005;
        }
    </style>
</head>
<body>
    <h2>Decorated String Encoder</h2>
    <p>Enter a string and an integer, then click Encode.</p>
    <p>The coder bean will return a string that shifts the letters in the original string by the value you specify.
        The value must be between 0 and 26.</p>

    <form th:action="@{/encode}" th:object="${coderBean}" method="post">
        <p>
            <label for="inputString">Enter a string: </label>
            <input type="text" id="inputString" th:field="*{inputString}" />
        </p>
        <p>
            <label for="transVal">Enter the number of letters to shift by: </label>
            <input type="text" id="transVal" th:field="*{transVal}" />
            <span class="error" th:if="${#fields.hasErrors('transVal')}" th:errors="*{transVal}"></span>
        </p>
        <p>
            <input type="submit" value="Encode" />
        </p>
    </form>

    <form th:action="@{/reset}" method="post">
        <p>
            <input type="submit" value="Reset" />
        </p>
    </form>

    <p th:if="${coderBean.codedString != null && !coderBean.codedString.isEmpty()}">
        <label>Result: </label>
        <span class="result" th:text="${coderBean.codedString}"></span>
    </p>

</body>
</html>
