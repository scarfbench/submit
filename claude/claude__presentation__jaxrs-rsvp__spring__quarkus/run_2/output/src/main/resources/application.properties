# Quarkus Configuration
quarkus.http.port=8080

# Datasource configuration (H2 in-memory)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.datasource.jdbc.driver=org.h2.Driver

# Hibernate configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# JSF/MyFaces configuration
quarkus.myfaces.faces-servlet.enabled=true
quarkus.myfaces.faces-servlet.url-mappings=*.xhtml,/faces/*
quarkus.myfaces.project-stage=Development

# Static resources
quarkus.http.static-resources.index-page=index.xhtml