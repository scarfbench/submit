# ---------------- Application Properties ----------------
server.port=8080

# Custom application properties
stream.url=${STREAM_URL:http://localhost:8080/dashboard/stream}
order.url=${ORDER_URL:http://localhost:8080/api/order}
store.id=${STORE_ID:ATLANTA}

# ---------------- Logging ----------------
logging.level.root=INFO
logging.level.io.quarkuscoffeeshop=DEBUG
logging.level.io.quarkuscoffeeshop.utils=WARN

# ---------------- Datasource (H2 default for dev) ----------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:coffeeshop;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------------- Kafka (optional, disabled by default) ----------------
kafka.enabled=${KAFKA_ENABLED:false}
# spring.kafka.bootstrap-servers=localhost:19092
# spring.kafka.consumer.group-id=coffeeshop-group
# spring.kafka.consumer.auto-offset-reset=earliest

# ---------------- Thymeleaf ----------------
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# ---------------- Actuator ----------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ---------------- Jackson ----------------
spring.jackson.serialization.write-dates-as-timestamps=false

# ---------------- Spring Boot Autoconfigure ----------------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
