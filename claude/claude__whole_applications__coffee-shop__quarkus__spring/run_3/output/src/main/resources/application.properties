# ---------------- Application Properties ----------------
stream.url=${STREAM_URL:http://localhost:8080/dashboard/stream}
order.url=${ORDER_URL:http://localhost:8080/api/order}
store.id=${STORE_ID:ATLANTA}

# ---------------- Server ----------------
server.port=8080

# ---------------- CORS ----------------
spring.web.cors.enabled=true

# ---------------- Logging ----------------
logging.level.root=INFO
logging.level.io.quarkuscoffeeshop=DEBUG
logging.level.io.quarkuscoffeeshop.utils=WARN
logging.pattern.console=%-5p [%c{2.}] (%t) %m%n

# ---------------- Datasource (H2 for dev) ----------------
spring.datasource.url=jdbc:h2:mem:coffeeshop;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# ---------------- JPA / Hibernate ----------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------------- Thymeleaf ----------------
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# ---------------- Jackson ----------------
spring.jackson.serialization.write-dates-as-timestamps=false
