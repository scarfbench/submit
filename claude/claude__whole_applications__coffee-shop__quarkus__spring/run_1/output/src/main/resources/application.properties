# ---- Spring Boot Application Properties ----
spring.application.name=coffeeshop

# ---- Server ----
server.port=8080

# ---- Custom Application Properties ----
app.stream-url=${STREAM_URL:http://localhost:8080/dashboard/stream}
app.order-url=${ORDER_URL:http://localhost:8080/api/order}
app.store-id=${STORE_ID:ATLANTA}

# ---- CORS ----
# Spring Boot handles CORS via WebMvcConfigurer or @CrossOrigin

# ---- Logging ----
logging.level.root=INFO
logging.level.io.quarkuscoffeeshop=DEBUG
logging.level.io.quarkuscoffeeshop.utils=WARN
logging.pattern.console=%-5p [%c{2.}] (%t) %m%n

# ---- Datasource (H2 default for dev) ----
spring.datasource.url=jdbc:h2:mem:coffeeshop;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# ---- Kafka ----
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
spring.kafka.consumer.group-id=coffeeshop-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ---- Kafka auto-start can be disabled when no broker is available ----
spring.kafka.listener.auto-startup=${KAFKA_ENABLED:false}

# ---- Thymeleaf ----
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
