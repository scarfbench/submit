# Application Configuration
spring.application.name=producerfields

# Server Configuration
server.port=8080
server.servlet.context-path=/producerfields

# DataSource Configuration (Derby Embedded)
spring.datasource.url=jdbc:derby:memory:producerfields;create=true
spring.datasource.driver-class-name=org.apache.derby.jdbc.EmbeddedDriver
spring.datasource.username=app
spring.datasource.password=app

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.DerbyDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
