# Spring Boot Application Configuration
# Migrated from Jakarta EE persistence.xml

# Application name
spring.application.name=producerfields

# DataSource configuration (Derby in-memory database)
spring.datasource.url=jdbc:derby:memory:producerfields;create=true
spring.datasource.driver-class-name=org.apache.derby.jdbc.EmbeddedDriver
spring.datasource.username=app
spring.datasource.password=app

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.DerbyDialect

# Server configuration
server.port=8080
server.servlet.context-path=/producerfields

# Thymeleaf configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
