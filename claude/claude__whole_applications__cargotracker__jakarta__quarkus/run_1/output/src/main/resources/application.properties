# Quarkus Application Configuration for Cargo Tracker

# HTTP
quarkus.http.port=8080

# Datasource Configuration (H2)
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:cargotracker;DB_CLOSE_DELAY=-1

# Hibernate ORM
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=import.sql

# REST path (replaces @ApplicationPath("rest"))
quarkus.resteasy-reactive.path=/rest

# Application configuration
app.graph-traversal-url=http://localhost:${quarkus.http.port}/rest/graph-traversal/shortest-path

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.eclipse.cargotracker".level=INFO
quarkus.log.category."org.hibernate".level=WARN

# Health
quarkus.health.openapi.included=true
