# Quarkus Application Configuration for Cargo Tracker

# HTTP
quarkus.http.port=8080

# Datasource Configuration (H2)
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:cargotracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Hibernate ORM
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=import.sql

# Jackson
quarkus.jackson.serialization-inclusion=non-null

# Application configuration
cargo.graphTraversalUrl=http://localhost:8080/rest/graph-traversal/shortest-path

# Health
quarkus.smallrye-health.root-path=health

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.eclipse.cargotracker".level=INFO
quarkus.log.category."org.hibernate".level=WARN
