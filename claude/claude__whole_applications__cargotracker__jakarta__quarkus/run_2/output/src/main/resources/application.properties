# Quarkus Application Configuration for Cargo Tracker

# Application name
quarkus.application.name=cargo-tracker

# HTTP Configuration
quarkus.http.port=8080

# Datasource Configuration (H2)
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:cargotracker;DB_CLOSE_DELAY=-1

# Hibernate ORM Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=import.sql

# Graph Traversal URL (internal service - same app)
graph.traversal.url=http://localhost:${quarkus.http.port}/rest/graph-traversal/shortest-path

# Jackson configuration
quarkus.jackson.serialization-inclusion=non-null

# Health check
quarkus.health.extensions.enabled=true

# Logging
quarkus.log.category."org.eclipse.cargotracker".level=INFO
quarkus.log.category."org.hibernate".level=WARN
