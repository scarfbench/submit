server.servlet.context-path=/cargo-tracker
server.port=8080

# Datasource
spring.datasource.url=jdbc:h2:mem:cargotracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
# Hibernate will automatically run import.sql after schema creation
spring.sql.init.mode=never

# Messaging - using Spring ApplicationEvents (no JMS broker needed)

# Application settings
app.configuration.GraphTraversalUrl=http://localhost:8080/cargo-tracker/rest/graph-traversal/shortest-path
