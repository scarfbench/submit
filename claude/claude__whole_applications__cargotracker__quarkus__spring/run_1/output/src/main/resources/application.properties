# Server configuration
server.port=8080
server.servlet.context-path=/cargo-tracker

# Datasource
spring.datasource.url=jdbc:h2:mem:cargo-tracker-database;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# H2 Console (for debugging)
spring.h2.console.enabled=true

# SQL initialization - disabled because SampleDataGenerator handles all data loading
spring.sql.init.mode=never

# Artemis JMS
spring.artemis.broker-url=tcp://localhost:61616
spring.artemis.user=quarkus
spring.artemis.password=quarkus

# App-specific config
app.configuration.GraphTraversalUrl=http://localhost:8080/cargo-tracker/rest/graph-traversal/shortest-path

# JMS queues
app.jms.CargoHandledQueue=CargoHandledQueue
app.jms.DeliveredCargoQueue=DeliveredCargoQueue
app.jms.HandlingEventRegistrationAttemptQueue=HandlingEventRegistrationAttemptQueue
app.jms.MisdirectedCargoQueue=MisdirectedCargoQueue
app.jms.RejectedRegistrationAttemptsQueue=RejectedRegistrationAttemptsQueue

# Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# Logging
logging.level.org.eclipse.cargotracker=INFO
logging.level.org.hibernate.SQL=DEBUG
