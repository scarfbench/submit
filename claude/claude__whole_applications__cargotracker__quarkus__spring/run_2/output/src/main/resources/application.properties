# Server configuration
server.servlet.context-path=/cargo-tracker
server.port=8080

# Datasource configuration
spring.datasource.url=jdbc:h2:mem:cargotracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=32
spring.datasource.hikari.minimum-idle=2

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
# Hibernate natively loads import.sql after schema creation when ddl-auto is set
spring.sql.init.mode=never

# ActiveMQ Artemis JMS
spring.artemis.broker-url=tcp://localhost:61616
spring.artemis.user=quarkus
spring.artemis.password=quarkus

# Application settings
app.configuration.GraphTraversalUrl=http://localhost:8080/cargo-tracker/rest/graph-traversal/shortest-path

# JMS queue names
app.jms.CargoHandledQueue=CargoHandledQueue
app.jms.DeliveredCargoQueue=DeliveredCargoQueue
app.jms.HandlingEventRegistrationAttemptQueue=HandlingEventRegistrationAttemptQueue
app.jms.MisdirectedCargoQueue=MisdirectedCargoQueue
app.jms.RejectedRegistrationAttemptsQueue=RejectedRegistrationAttemptsQueue

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.org.eclipse.cargotracker=INFO
logging.level.org.springframework.jms=INFO
