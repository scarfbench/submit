# Spring Boot Configuration for Counter Application
spring.application.name=counter

# JSF Configuration
joinfaces.jsf.project-stage=Development

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Faces Servlet Configuration
joinfaces.faces-servlet.enabled=true
joinfaces.faces-servlet.url-mappings=*.xhtml

# Welcome file
joinfaces.primefaces.welcome-file=index.xhtml
