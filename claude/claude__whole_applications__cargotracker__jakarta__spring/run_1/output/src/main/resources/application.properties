# Spring Boot Application Configuration for Cargo Tracker

# Server configuration
server.port=8080
server.servlet.context-path=/cargo-tracker

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:cargotracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SQL initialization
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# Application Settings
app.graphTraversalUrl=http://localhost:8080/cargo-tracker/rest/graph-traversal/shortest-path

# Logging
logging.level.org.eclipse.cargotracker=INFO
logging.level.org.springframework=INFO
