# Spring Boot Application Configuration
spring.application.name=cargo-tracker
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:cargotracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Graph Traversal URL (self-referencing since pathfinder is embedded)
app.graphTraversalUrl=http://localhost:8080/api/graph-traversal/shortest-path

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.org.eclipse.cargotracker=INFO
logging.level.org.springframework=INFO
