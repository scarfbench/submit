# HTTP port configuration
quarkus.http.port=9080

# JSF Configuration
quarkus.myfaces.faces-servlet.url-mappings=*.xhtml
jakarta.faces.PROJECT_STAGE=Development

# Logging configuration
quarkus.log.level=INFO
quarkus.log.category."org.apache.myfaces".level=INFO

# Mail configuration for Quarkus
quarkus.mailer.host=localhost
quarkus.mailer.port=3025
quarkus.mailer.username=jack
quarkus.mailer.password=changeMe
quarkus.mailer.auth-methods=DIGEST-MD5 CRAM-SHA256 CRAM-SHA1 CRAM-MD5 PLAIN LOGIN
quarkus.mailer.start-tls=DISABLED
quarkus.mailer.from=jack@localhost

# Custom mail properties for Jakarta Mail Session
app.mail.from=jack@localhost
app.mail.host=localhost
app.mail.port=3025
app.mail.username=jack
app.mail.password=changeMe
app.mail.auth=true
app.mail.starttls=false
