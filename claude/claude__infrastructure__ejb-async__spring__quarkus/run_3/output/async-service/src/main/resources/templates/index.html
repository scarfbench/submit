<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Async Mail Demo</title>
</head>

<body>
    <h2>Send email</h2>
    <form action="/thy/send" method="post">
        <label for="email">Send email to:</label>
        <input id="email"
               name="email"
               type="email"
               value="{email}"
               required />
        <button type="submit">Send email</button>
    </form>
    <div>
        <strong>Status:</strong>
        <span>{status}</span>
    </div>
    <p>
        <a href="/thy/response">Refresh</a>
    </p>
</body>

</html>
