# Quarkus Configuration for DukeETF2 Application

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# WebSocket Configuration
quarkus.websocket.max-frame-size=65536
quarkus.websocket.dispatch-to-worker=true

# Logging Configuration
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.level=INFO
quarkus.log.category."jakarta.tutorial".level=INFO

# Application Configuration
quarkus.application.name=dukeetf2
quarkus.application.version=10-SNAPSHOT

# Scheduler Configuration
quarkus.scheduler.enabled=true
