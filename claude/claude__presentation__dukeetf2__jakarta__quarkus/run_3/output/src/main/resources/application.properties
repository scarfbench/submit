# Quarkus Configuration for dukeetf2 application

# HTTP Configuration
quarkus.http.port=9080
quarkus.http.host=0.0.0.0

# WebSocket Configuration
quarkus.websocket.max-frame-size=65536

# Application Configuration
quarkus.application.name=dukeetf2

# Development mode settings
%dev.quarkus.http.port=9080

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."jakarta.tutorial.web.dukeetf2".level=INFO

# Scheduler configuration
quarkus.scheduler.enabled=true
