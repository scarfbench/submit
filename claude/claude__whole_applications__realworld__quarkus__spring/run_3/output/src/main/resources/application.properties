# Server
server.servlet.context-path=/api

# Database configuration - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/realworld
spring.datasource.username=realworld
spring.datasource.password=realworld
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Jackson
spring.jackson.serialization.WRAP_ROOT_VALUE=true
spring.jackson.deserialization.UNWRAP_ROOT_VALUE=true

# JWT
jwt.secret=realworld-secret-key-that-is-long-enough-for-hmac-sha256-algorithm-needs-to-be-256-bits
jwt.issuer=users-service
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
