# Spring Boot Configuration
server.servlet.context-path=/api
server.port=8080

# Database configuration - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/realworld
spring.datasource.username=realworld
spring.datasource.password=realworld
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT settings
jwt.private-key-location=classpath:privateKey.pem
jwt.public-key-location=classpath:publicKey.pem
jwt.issuer=users-service

# Actuator - health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.server.port=8080
