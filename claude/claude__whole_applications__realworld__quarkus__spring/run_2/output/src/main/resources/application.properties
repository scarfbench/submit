# Server configuration
server.servlet.context-path=/api
server.port=8080

# Database configuration - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/realworld
spring.datasource.username=realworld
spring.datasource.password=realworld
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# JWT settings
jwt.private-key-location=classpath:privateKey.pem
jwt.public-key-location=classpath:publicKey.pem
jwt.issuer=users-service

# Actuator
management.endpoints.web.exposure.include=health
