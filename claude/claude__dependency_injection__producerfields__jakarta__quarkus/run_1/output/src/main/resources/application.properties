# Quarkus Configuration for Producer Fields Application

# Datasource configuration (H2 in-memory database)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:producerfields;DB_CLOSE_DELAY=-1
quarkus.datasource.username=app
quarkus.datasource.password=app

# Hibernate configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# JSF Configuration
quarkus.myfaces.project-stage=Development
quarkus.myfaces.interpret-empty-string-submitted-values-as-null=true

# HTTP configuration
quarkus.http.port=8080
quarkus.http.test-port=8081

# Application configuration
quarkus.index-dependency.jakarta-tutorial.group-id=jakarta.examples.tutorial.cdi
quarkus.index-dependency.jakarta-tutorial.artifact-id=producerfields
