# Quarkus Configuration for Producer Fields Application

# Application name
quarkus.application.name=producerfields

# Datasource configuration (Derby in-memory)
quarkus.datasource.db-kind=derby
quarkus.datasource.jdbc.url=jdbc:derby:memory:producerfields;create=true
quarkus.datasource.username=app
quarkus.datasource.password=app

# Hibernate ORM configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Transaction configuration
quarkus.transaction-manager.default-transaction-timeout=300

# JSF/MyFaces Configuration
quarkus.myfaces.project-stage=Development
quarkus.myfaces.interpret-empty-string-submitted-values-as-null=true

# HTTP configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Session configuration
quarkus.servlet.context-path=/

# Logging
quarkus.log.console.enable=true
quarkus.log.level=INFO
