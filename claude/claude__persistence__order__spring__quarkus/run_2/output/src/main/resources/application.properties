# Quarkus HTTP port
quarkus.http.port=8080

# Datasource configuration (H2 in-memory)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true

# Logging
quarkus.log.category."com.example.orderspring".level=INFO
quarkus.log.category."org.hibernate.SQL".level=DEBUG
quarkus.log.category."org.hibernate.type.descriptor.sql".level=TRACE

# MyFaces / JSF configuration
# Note: quarkus.myfaces.project-stage not recognized in this version;
# JSF project stage is set via standard Jakarta Faces init param if needed
