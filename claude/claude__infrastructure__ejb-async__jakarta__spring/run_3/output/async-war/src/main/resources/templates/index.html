<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Async Email Example - Spring Boot</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        form {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="email"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            margin-right: 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .send-btn {
            background: #007bff;
            color: white;
        }
        .cancel-btn {
            background: #6c757d;
            color: white;
        }
        #response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 3px;
            display: none;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Async Email Example</h1>
    <p>Migrated from Jakarta EE to Spring Boot</p>

    <form id="emailForm" onsubmit="return sendEmail(event)">
        <label for="email">Send email to:</label>
        <input type="email" id="email" name="email" required placeholder="example@email.com">

        <div>
            <button type="submit" class="send-btn">Send email</button>
            <button type="button" class="cancel-btn" onclick="resetForm()">Cancel</button>
        </div>
    </form>

    <div id="response"></div>

    <script>
        function sendEmail(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const responseDiv = document.getElementById('response');

            fetch('/send', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'email=' + encodeURIComponent(email)
            })
            .then(response => response.json())
            .then(data => {
                responseDiv.className = 'success';
                responseDiv.innerHTML = '<strong>Status:</strong> ' + data.status + '<br><strong>Message:</strong> ' + data.message;
                responseDiv.style.display = 'block';

                // Redirect to response page after 2 seconds
                setTimeout(() => {
                    window.location.href = '/response?email=' + encodeURIComponent(email);
                }, 2000);
            })
            .catch(error => {
                responseDiv.className = 'error';
                responseDiv.innerHTML = '<strong>Error:</strong> ' + error.message;
                responseDiv.style.display = 'block';
            });

            return false;
        }

        function resetForm() {
            document.getElementById('emailForm').reset();
            document.getElementById('response').style.display = 'none';
        }
    </script>
</body>
</html>
