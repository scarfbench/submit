# Quarkus Application Configuration
quarkus.application.name=Address Book (Quarkus + JSF)

# H2 Datasource Configuration
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:addressbook;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# Server Configuration
quarkus.http.port=8080

# JSF / MyFaces Configuration
quarkus.myfaces.project-stage=Development

# Jackson date format
quarkus.jackson.date-format=MM/dd/yyyy
