# Quarkus Application Configuration - DayTrader
# Migrated from Spring Boot application.yml

# HTTP Server
quarkus.http.port=8080
quarkus.http.root-path=/daytrader

# Servlet configuration
quarkus.servlet.context-path=/

# Session timeout
quarkus.http.session.timeout=30M

# Datasource configuration (H2)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:tradedb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.max-size=100
quarkus.datasource.jdbc.min-size=10
quarkus.datasource.jdbc.initial-size=10

# Hibernate ORM / JPA
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
quarkus.hibernate-orm.sql-load-script=import.sql

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.ibm.websphere.samples.daytrader".level=DEBUG

# Artemis JMS - using embedded broker (configured in JmsConfig.java)
# quarkus.artemis.url=vm://0

# Disable SSL for simplicity (was using self-signed cert)
quarkus.http.insecure-requests=enabled

# DayTrader Configuration
daytrader.runtime-mode=${DAYTRADER_RUNTIME_MODE:${RUNTIME_MODE:1}}
daytrader.order-processing-mode=${DAYTRADER_ORDER_PROCESSING_MODE:${ORDER_PROCESSING_MODE:0}}
daytrader.max-users=${DAYTRADER_MAX_USERS:${MAX_USERS:500}}
daytrader.max-quotes=${DAYTRADER_MAX_QUOTES:${MAX_QUOTES:400}}
daytrader.publish-quotes=${DAYTRADER_PUBLISH_QUOTES:${PUBLISH_QUOTES:false}}
daytrader.display-order-alerts=${DAYTRADER_DISPLAY_ORDER_ALERTS:${DISPLAY_ORDER_ALERTS:false}}
daytrader.web-interface=${DAYTRADER_WEB_INTERFACE:${WEB_INTERFACE:0}}
daytrader.list-quote-price-change-frequency=${DAYTRADER_LIST_QUOTE_PRICE_CHANGE_FREQUENCY:${LIST_QUOTE_PRICE_CHANGE_FREQUENCY:5}}
daytrader.prim-iterations=${DAYTRADER_PRIM_ITERATIONS:200}
daytrader.market-summary-interval=${DAYTRADER_MARKET_SUMMARY_INTERVAL:20}
daytrader.long-run=${DAYTRADER_LONG_RUN:false}

# Banner
quarkus.banner.enabled=true

# Graceful shutdown
quarkus.shutdown.timeout=10
