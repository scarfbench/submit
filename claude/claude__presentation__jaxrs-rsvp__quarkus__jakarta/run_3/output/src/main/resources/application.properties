# DataSource Configuration
datasource.db-kind=h2
datasource.username=sa
datasource.password=
datasource.jdbc.url=jdbc:h2:mem:customer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Hibernate Configuration
hibernate.dialect=org.hibernate.dialect.H2Dialect
hibernate.hbm2ddl.auto=create-drop
hibernate.show_sql=true

# JAX-RS Configuration
jaxrs.application.path=/webapi

# JSF Configuration
jakarta.faces.PROJECT_STAGE=Development
jakarta.faces.FACELETS_SKIP_COMMENTS=true
jakarta.faces.FACELETS_REFRESH_PERIOD=-1
jakarta.faces.DEFAULT_SUFFIX=.xhtml
jakarta.faces.FACELETS_VIEW_MAPPINGS=*.xhtml

# Logging Configuration
log.level=INFO
log.category.jakarta.tutorial.customer.level=DEBUG
