# Quarkus Application Configuration
# Migrated from Jakarta EE to Quarkus

# Application name
quarkus.application.name=interceptor

# HTTP Configuration (equivalent to server.xml httpPort)
quarkus.http.port=9080
quarkus.http.ssl-port=9443
quarkus.http.host=0.0.0.0

# Servlet Configuration
quarkus.servlet.context-path=/

# Logging Configuration (equivalent to server.xml logging)
quarkus.log.console.enable=true
quarkus.log.console.level=INFO
quarkus.log.category."jakarta.tutorial.interceptor".level=INFO

# CDI Configuration
quarkus.arc.remove-unused-beans=false
