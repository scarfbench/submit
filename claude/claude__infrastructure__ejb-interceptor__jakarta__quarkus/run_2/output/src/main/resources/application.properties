# Quarkus Configuration for Interceptor Example
# Migrated from Jakarta EE to Quarkus

# HTTP Configuration
quarkus.http.port=9080
quarkus.http.host=0.0.0.0

# Logging Configuration
quarkus.log.console.enable=true
quarkus.log.console.level=INFO
quarkus.log.category."jakarta.tutorial.interceptor".level=INFO

# Application Configuration
quarkus.application.name=interceptor

# Development mode settings
%dev.quarkus.http.port=9080
%dev.quarkus.log.console.level=DEBUG
