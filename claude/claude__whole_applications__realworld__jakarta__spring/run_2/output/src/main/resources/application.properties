server.port=8080
server.servlet.context-path=/

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# DataSource
spring.datasource.url=jdbc:postgresql://${POSTGRESQL_HOSTNAME:localhost}:${POSTGRESQL_PORT:5432}/${POSTGRESQL_DBNAME:postgres_db}
spring.datasource.username=${POSTGRESQL_USER:postgres_user}
spring.datasource.password=${POSTGRESQL_PW:S3cret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Config
jwt.issuer=users-service
jwt.expiration.time.minutes=10
jwt.secret=secret123

# Jackson
spring.jackson.serialization.wrap-root-value=false
spring.jackson.deserialization.unwrap-root-value=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
