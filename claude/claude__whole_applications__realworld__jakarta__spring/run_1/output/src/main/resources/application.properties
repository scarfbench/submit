server.port=8080
server.servlet.context-path=/api
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres_db
spring.datasource.username=postgres_user
spring.datasource.password=S3cret
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jackson.serialization.WRAP_ROOT_VALUE=false
spring.jackson.deserialization.UNWRAP_ROOT_VALUE=false
jwt.issuer=users-service
jwt.secret=secret123
jwt.expiration.time.minutes=10
