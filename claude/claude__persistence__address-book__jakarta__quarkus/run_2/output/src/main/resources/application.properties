# Quarkus Address Book Application Configuration

# HTTP configuration
quarkus.http.port=8080

# Datasource configuration (H2 in-memory, matching original persistence.xml)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:addressbook;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Jackson date format (configured via ObjectMapper customizer if needed)
