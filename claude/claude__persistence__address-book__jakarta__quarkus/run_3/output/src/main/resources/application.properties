# Quarkus Address Book - Application Configuration

# HTTP Configuration
quarkus.http.port=8080

# Datasource Configuration (H2 in-memory, replaces Liberty DataSource)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:addressbook;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM Configuration (replaces persistence.xml)
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Jackson serialization
quarkus.jackson.serialization-inclusion=non-null
