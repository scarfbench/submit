<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head}" />
</head>
<body>
  <th:block th:replace="~{fragments/layout :: navbar}" />
  <div class="container-fluid">
    <div class="container xd-container">
      <h2>
        <span th:if="${pet == null}">New </span>Pet
      </h2>
      <form class="form-horizontal" method="post">
        <input type="hidden" name="id" value="" />
        <div class="form-group has-feedback">
          <div class="form-group">
            <label class="col-sm-2 control-label">Owner</label>
            <div class="col-sm-10">
              <span th:text="${owner.firstName}"></span>
            </div>
          </div>

          <div class="form-group">
            <label class="col-sm-2 control-label">Name</label>
            <div class="col-sm-10">
              <div>
                <input class="form-control" type="text" id="name" name="name"
                       th:value="${pet != null ? pet.name : ''}"/>
              </div>
              <span th:if="${nameError}" class="help-inline" th:text="${nameError}"></span>
            </div>
          </div>

          <div class="form-group">
            <label class="col-sm-2 control-label">Birthdate</label>
            <div class="col-sm-10">
              <div>
                <input class="form-control" type="text" placeholder="YYYY-MM-DD"
                       title="Enter a date in this format: YYYY-MM-DD"
                       id="birthDate" name="birthDate"
                       th:value="${pet != null ? pet.birthDate : ''}"/>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="col-sm-2 control-label">Type</label>
            <div class="col-sm-10">
              <select id="type" name="type">
                <option th:each="petType : ${petTypes}"
                        th:value="${petType.name}"
                        th:text="${petType.name}"
                        th:selected="${pet != null and pet.type != null and pet.type.name == petType.name}">
                </option>
              </select>
            </div>
          </div>

        </div>
        <div class="form-group">
          <div class="col-sm-offset-2 col-sm-10">
            <button class="btn btn-primary" type="submit">
              <span th:if="${pet != null}">Edit Pet</span>
              <span th:if="${pet == null}">Add Pet</span>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
  <th:block th:replace="~{fragments/layout :: scripts}" />
</body>
</html>
