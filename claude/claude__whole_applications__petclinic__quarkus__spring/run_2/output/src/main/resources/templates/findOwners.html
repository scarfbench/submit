<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head}" />
</head>
<body>
  <th:block th:replace="~{fragments/layout :: navbar}" />
  <div class="container-fluid">
    <div class="container xd-container">
      <h2>Find Owners</h2>

      <form th:action="@{/owners}" method="get" class="form-horizontal" id="search-owner-form">
        <div class="form-group">
          <div class="control-group" id="lastNameGroup">
            <label class="col-sm-2 control-label">Last Name</label>
            <div class="col-sm-10">
              <input type="text" class="form-control" id="lastName" name="lastName" size="30" maxlength="80" />
              <div th:if="${noResults}">
                <span class="help-inline">
                  <p>lastName not found</p>
                </span>
              </div>
            </div>
          </div>
        </div>
        <div class="form-group">
          <div class="col-sm-offset-2 col-sm-10">
            <button type="submit" class="btn btn-primary">Find Owner</button>
          </div>
        </div>

        <a class="btn btn-primary" th:href="@{/owners/new}">Add Owner</a>
      </form>
    </div>
  </div>
  <th:block th:replace="~{fragments/layout :: scripts}" />
</body>
</html>
