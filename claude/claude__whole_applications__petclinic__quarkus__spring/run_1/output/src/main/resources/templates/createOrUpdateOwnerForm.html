<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head}" />
</head>
<body>
  <nav th:replace="~{fragments/layout :: navbar}"></nav>
  <div class="container-fluid">
    <div class="container xd-container">
      <h2>Owner</h2>
      <form class="form-horizontal" id="add-owner-form" method="post" th:object="${owner}">
        <div class="form-group has-feedback">

          <div class="form-group" th:classappend="${#fields.hasErrors('firstName')} ? 'has-error' : ''">
            <label class="col-sm-2 control-label">Name</label>
            <div class="col-sm-10">
              <div>
                <input class="form-control" type="text" id="firstName" name="firstName"
                       th:value="${owner != null ? owner.firstName : ''}" />
              </div>
              <span th:if="${#fields.hasErrors('firstName')}" class="help-inline" th:errors="*{firstName}"></span>
            </div>
          </div>

          <div class="form-group" th:classappend="${#fields.hasErrors('lastName')} ? 'has-error' : ''">
            <label class="col-sm-2 control-label">Last Name</label>
            <div class="col-sm-10">
              <div>
                <input class="form-control" type="text" id="lastName" name="lastName"
                       th:value="${owner != null ? owner.lastName : ''}" />
              </div>
              <span th:if="${#fields.hasErrors('lastName')}" class="help-inline" th:errors="*{lastName}"></span>
            </div>
          </div>

          <div class="form-group" th:classappend="${#fields.hasErrors('address')} ? 'has-error' : ''">
            <label class="col-sm-2 control-label">Address</label>
            <div class="col-sm-10">
              <div>
                <input class="form-control" type="text" id="address" name="address"
                       th:value="${owner != null ? owner.address : ''}" />
              </div>
              <span th:if="${#fields.hasErrors('address')}" class="help-inline" th:errors="*{address}"></span>
            </div>
          </div>

          <div class="form-group" th:classappend="${#fields.hasErrors('city')} ? 'has-error' : ''">
            <label class="col-sm-2 control-label">City</label>
            <div class="col-sm-10">
              <div>
                <input class="form-control" type="text" id="city" name="city"
                       th:value="${owner != null ? owner.city : ''}" />
              </div>
              <span th:if="${#fields.hasErrors('city')}" class="help-inline" th:errors="*{city}"></span>
            </div>
          </div>

          <div class="form-group" th:classappend="${#fields.hasErrors('telephone')} ? 'has-error' : ''">
            <label class="col-sm-2 control-label">Telephone</label>
            <div class="col-sm-10">
              <div>
                <input class="form-control" type="text" id="telephone" name="telephone"
                       th:value="${owner != null ? owner.telephone : ''}" />
              </div>
              <span th:if="${#fields.hasErrors('telephone')}" class="help-inline" th:errors="*{telephone}"></span>
            </div>
          </div>

        </div>
        <div class="form-group">
          <div class="col-sm-offset-2 col-sm-10">
            <button class="btn btn-primary" type="submit">
              <span th:if="${owner != null and owner.id != null}">Edit Owner</span>
              <span th:if="${owner == null or owner.id == null}">Add Owner</span>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
  <script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
