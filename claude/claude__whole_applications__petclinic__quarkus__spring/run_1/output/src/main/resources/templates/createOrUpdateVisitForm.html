<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/layout :: head}" />
</head>
<body>
  <nav th:replace="~{fragments/layout :: navbar}"></nav>
  <div class="container-fluid">
    <div class="container xd-container">
      <h2>
        <span th:if="${visit == null}">New </span>Visit
      </h2>

      <b>Pet</b>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Name</th>
            <th>Birthdate</th>
            <th>Type</th>
            <th>Owner</th>
          </tr>
        </thead>
        <tr>
          <td th:text="${pet.name}"></td>
          <td th:text="${pet.formattedBirthDate}"></td>
          <td th:text="${pet.type != null ? pet.type.name : ''}"></td>
          <td th:text="${pet.owner.firstName} + ' ' + ${pet.owner.lastName}"></td>
        </tr>
      </table>

      <form class="form-horizontal" method="post">
        <div class="form-group has-feedback">

          <div class="form-group">
            <label class="col-sm-2 control-label">Date</label>
            <div class="col-sm-10">
              <div>
                <input class="form-control" type="text" placeholder="YYYY-MM-DD"
                       id="date" name="date"
                       th:value="${visit != null and visit.date != null ? visit.formattedDate : ''}"/>
              </div>
            </div>
          </div>

          <div class="form-group" th:classappend="${descriptionError != null} ? 'has-error' : ''">
            <label class="col-sm-2 control-label">Description</label>
            <div class="col-sm-10">
              <div>
                <input class="form-control" type="text" id="description" name="description"
                       th:value="${visit != null and visit.description != null ? visit.description : ''}" />
              </div>
              <span th:if="${descriptionError != null}" class="help-inline" th:text="${descriptionError}"></span>
            </div>
          </div>

        </div>

        <div class="form-group">
          <div class="col-sm-offset-2 col-sm-10">
            <button class="btn btn-primary" type="submit">Add Visit</button>
          </div>
        </div>
      </form>

      <br />
      <b>Previous Visits</b>
      <table class="table table-striped">
        <tr>
          <th>Date</th>
          <th>Description</th>
        </tr>
        <tr th:each="v : ${pet.sortedVisits}">
          <td th:text="${v.formattedDate}"></td>
          <td th:text="${v.description}"></td>
        </tr>
      </table>
    </div>
  </div>
  <script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
