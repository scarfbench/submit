<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{:: #body-content})}">
<body>
<div id="body-content">
<h2>
    <span th:unless="${pet != null}">New </span>Pet
</h2>
  <form class="form-horizontal" method="post">
    <input type="hidden" name="id" value="" />
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label">Owner</label>
        <div class="col-sm-10">
          <span th:text="${owner.firstName}">Owner Name</span>
        </div>
      </div>
      <div class="form-group" th:classappend="${errors != null and errors.containsKey('name')} ? 'has-error' : ''">
        <label class="col-sm-2 control-label">Name</label>
        <div class="col-sm-10">
            <div>
                <input class="form-control" type="text" id="name" name="name"
                       th:value="${pet != null ? pet.name : ''}"/>
            </div>
            <span th:if="${errors != null and errors.containsKey('name')}"
                  class="help-inline" th:text="${errors.get('name')}"></span>
        </div>
      </div>
      <div class="form-group" th:classappend="${errors != null and errors.containsKey('birthDate')} ? 'has-error' : ''">
        <label class="col-sm-2 control-label">Birthdate</label>
        <div class="col-sm-10">
            <div>
                <input class="form-control" type="text" placeholder="YYYY-MM-DD" title="Enter a date in this format: YYYY-MM-DD" id="birthDate" name="birthDate"
                       th:value="${pet != null and pet.birthDate != null ? pet.birthDate : ''}"/>
            </div>
            <span th:if="${errors != null and errors.containsKey('birthDate')}"
                  class="help-inline" th:text="${errors.get('birthDate')}"></span>
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Type</label>
        <div class="col-sm-10">
          <select id="type" name="type">
            <option th:each="petType : ${petTypes}"
                    th:value="${petType.name}"
                    th:text="${petType.name}"
                    th:selected="${pet != null and pet.type != null and petType.name == pet.type.name}">Type</option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button class="btn btn-primary" type="submit">
          <span th:if="${pet != null}">Edit Pet</span>
          <span th:unless="${pet != null}">Add Pet</span>
        </button>
      </div>
    </div>
  </form>
</div>
</body>
</html>
