<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{:: #body-content})}">
<body>
<div id="body-content">
  <h2>Find Owners</h2>
  <form action="/owners" method="get" class="form-horizontal" id="search-owner-form">
    <div class="form-group">
      <div class="control-group" id="lastNameGroup">
        <label class="col-sm-2 control-label">Last Name</label>
        <div class="col-sm-10">
          <input type="text" class="form-control" id="lastName" name="lastName" size="30" maxlength="80" />
          <div th:if="${errors != null and !errors.isEmpty()}">
            <span class="help-inline">
              <div>
                <p th:each="err : ${errors}" th:text="${err}"></p>
              </div>
            </span>
          </div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button type="submit" class="btn btn-primary">Find Owner</button>
      </div>
    </div>
    <a class="btn btn-primary" th:href="@{/owners/new}">Add Owner</a>
  </form>
</div>
</body>
</html>
