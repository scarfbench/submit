<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{:: #body-content})}">
<body>
<div id="body-content">
<h2>Owners</h2>
<table id="owners" class="table table-striped">
    <thead>
        <tr>
            <th style="width: 150px;">Name</th>
            <th style="width: 200px;">Address</th>
            <th>City</th>
            <th style="width: 120px">Telephone</th>
            <th>Pets</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="owner : ${owners}">
            <td>
                <a th:href="@{'/owners/' + ${owner.id}}" th:text="${owner.firstName + ' ' + owner.lastName}">Name</a>
            </td>
            <td th:text="${owner.address}">Address</td>
            <td th:text="${owner.city}">City</td>
            <td th:text="${owner.telephone}">Telephone</td>
            <td>
                <span th:each="pet : ${owner.pets}" th:text="${pet.name + ' '}">Pet</span>
            </td>
        </tr>
    </tbody>
</table>
</div>
</body>
</html>
