# Server
server.port=8080

# Database - PostgreSQL (overridable via env vars)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:coffeeshop}
spring.datasource.username=${DB_USER:cafe}
spring.datasource.password=${DB_PASSWORD:cafe}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka - make startup non-blocking so app starts even without Kafka
spring.kafka.listener.missing-topics-fatal=false
# Kafka producer - fail fast if broker is not available
spring.kafka.producer.properties.max.block.ms=5000
spring.kafka.producer.properties.delivery.timeout.ms=5000
spring.kafka.producer.properties.request.timeout.ms=5000

# Actuator health endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Static resources - serve from classpath:/static/
spring.web.resources.static-locations=classpath:/static/
