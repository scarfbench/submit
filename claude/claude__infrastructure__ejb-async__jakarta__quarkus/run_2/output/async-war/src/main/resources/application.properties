# Quarkus configuration for async-war application

# HTTP configuration
quarkus.http.port=9080
quarkus.http.ssl-port=9443

# Mail configuration (replacing Liberty mailSession)
quarkus.mailer.from=jack@localhost
quarkus.mailer.host=localhost
quarkus.mailer.port=3025
quarkus.mailer.username=jack
quarkus.mailer.password=changeMe
quarkus.mailer.start-tls=DISABLED
quarkus.mailer.auth-methods=DIGEST-MD5 CRAM-SHA256 CRAM-SHA1 CRAM-MD5 PLAIN LOGIN
quarkus.mailer.mock=false

# Logging configuration
quarkus.log.console.enable=true
quarkus.log.console.level=INFO
quarkus.log.category."jakarta.tutorial.async".level=INFO

# JSF/Faces configuration
quarkus.servlet.context-path=/
