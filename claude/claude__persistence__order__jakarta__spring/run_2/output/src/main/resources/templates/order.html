<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Order Java Persistence Example</title>
    <link rel="stylesheet" th:href="@{/css/default.css}"/>
</head>
<body>
    <h1>Order Java Persistence Example</h1>

    <h2>View All Orders</h2>
    <table rules="all" cellpadding="5">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Shipment Info</th>
                <th>Status</th>
                <th>Last Updated</th>
                <th>Discount</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td>
                    <a th:href="@{/lineItem(orderId=${order.orderId})}" th:text="${order.orderId}">1111</a>
                </td>
                <td th:text="${order.shipmentInfo}">Shipment Info</td>
                <td th:text="${order.status}">N</td>
                <td th:text="${order.lastUpdate}">2024-01-01</td>
                <td th:text="${order.discount} + '%'">10%</td>
                <td>
                    <form th:action="@{/order/delete}" method="post" style="display:inline;">
                        <input type="hidden" name="orderId" th:value="${order.orderId}"/>
                        <input type="submit" value="Delete"/>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <h2>Create New Order</h2>
    <form th:action="@{/order/create}" method="post">
        <label for="orderId">Order ID: </label>
        <input type="text" id="orderId" name="orderId" required="required"/><br/>

        <label for="shipmentInfo">Shipment Info: </label>
        <input type="text" id="shipmentInfo" name="shipmentInfo" required="required"/><br/>

        <label for="status">Status: </label>
        <select id="status" name="status" required="required">
            <option value="Y">Complete</option>
            <option value="N">Pending</option>
        </select><br/>

        <label for="discount">Discount: </label>
        <select id="discount" name="discount" required="required">
            <option value="0">0 %</option>
            <option value="5">5 %</option>
            <option value="10">10 %</option>
            <option value="15">15 %</option>
            <option value="20">20 %</option>
            <option value="25">25 %</option>
            <option value="30">30 %</option>
            <option value="35">35 %</option>
            <option value="40">40 %</option>
        </select><br/>

        <input type="submit" value="Submit"/>
    </form>

    <h2>Find Vendors</h2>
    <form th:action="@{/vendor/find}" method="post">
        <label for="vendorName">Search for Vendors: </label>
        <input type="text" id="vendorName" name="vendorName" required="required"
               th:value="${vendorName}"/>
        <input type="submit" value="Find Vendor"/>
    </form>

    <table th:if="${vendorSearchResults != null and !vendorSearchResults.isEmpty()}"
           rules="all" cellpadding="5">
        <thead>
            <tr>
                <th>Vendor</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="vendor : ${vendorSearchResults}">
                <td th:text="${vendor}">Vendor Name</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
