<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Order Persistence Example</title>
    <link rel="stylesheet" th:href="@{/css/default.css}"/>
</head>
<body>
    <h1>Line Items for Order #<span th:text="${currentOrder}">1111</span></h1>

    <table rules="all" cellpadding="5">
        <thead>
            <tr>
                <th>Item ID</th>
                <th>Quantity</th>
                <th>Vendor Part Number</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="lineItem : ${lineItems}">
                <td th:text="${lineItem.itemId}">1</td>
                <td th:text="${lineItem.quantity}">3</td>
                <td th:text="${lineItem.vendorPart?.vendorPartNumber}">1</td>
            </tr>
        </tbody>
    </table>

    <br/>

    <h2>Available Parts</h2>
    <table rules="all" cellpadding="5">
        <thead>
            <tr>
                <th>Part Number</th>
                <th>Revision</th>
                <th>Vendor Part Number</th>
                <th>Add To Order</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="part : ${parts}">
                <td th:text="${part.partNumber}">1234</td>
                <td th:text="${part.revision}">1</td>
                <td th:text="${part.vendorPart?.vendorPartNumber}">1</td>
                <td>
                    <form th:action="@{/lineItem/add}" method="post" style="display:inline;">
                        <input type="hidden" name="orderId" th:value="${currentOrder}"/>
                        <input type="hidden" name="partNumber" th:value="${part.partNumber}"/>
                        <input type="hidden" name="revision" th:value="${part.revision}"/>
                        <input type="submit" value="Add"/>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <br/>
    <a th:href="@{/order}">Back To Orders</a>
</body>
</html>
