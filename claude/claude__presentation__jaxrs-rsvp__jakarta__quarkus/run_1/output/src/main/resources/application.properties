# Quarkus Application Configuration

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Datasource Configuration (H2 in-memory database)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:rsvpdb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM Configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=no-file

# Application path context
quarkus.resteasy-reactive.path=/webapi

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."jakarta.tutorial".level=INFO
