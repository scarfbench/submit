# Quarkus Roster Application Configuration

# HTTP port
quarkus.http.port=8080

# Datasource configuration (H2 in-memory, equivalent to original Liberty server.xml)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:roster;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM configuration (equivalent to original persistence.xml drop-and-create)
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Package type for building
quarkus.package.jar.type=uber-jar
