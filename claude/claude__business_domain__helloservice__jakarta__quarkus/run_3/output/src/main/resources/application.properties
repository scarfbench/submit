# Quarkus Configuration for HelloService Web Service

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# CXF SOAP Web Services Configuration
quarkus.cxf.path=/HelloServiceBeanService
quarkus.cxf.services.hello.path=/HelloServiceBean
quarkus.cxf.services.hello.implementor=jakarta.tutorial.helloservice.ejb.HelloServiceBean
quarkus.cxf.services.hello.wsdl-path=/wsdl/HelloServiceBean.wsdl

# Logging Configuration
quarkus.log.console.enable=true
quarkus.log.console.level=INFO
quarkus.log.category."jakarta.tutorial".level=DEBUG

# Application Information
quarkus.application.name=helloservice
quarkus.application.version=10-SNAPSHOT
