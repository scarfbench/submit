# ---- Mail Configuration ----
# These properties are read by MailSessionProducer to configure Jakarta Mail
mail.smtp.host=localhost
mail.smtp.port=3025
mail.smtp.auth=true
mail.smtp.username=jack
mail.smtp.password=changeMe
mail.smtp.from=jack@localhost
mail.smtp.starttls.enable=false

# ---- Logging Configuration ----
# Note: Actual logging configuration should be in logging.properties or similar
# This is here for reference
log.level=INFO