# Spring Boot Application Configuration
# Migrated from Jakarta EE / Open Liberty configuration

# Server configuration
server.port=8080

# H2 Database Configuration (replaces Liberty server.xml datasource)
spring.datasource.url=jdbc:h2:mem:addressbook
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration (replaces persistence.xml)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (optional, for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jackson date format
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC
