# Spring Boot Application Configuration
spring.application.name=petclinic-spring

# Server
server.port=8080
server.servlet.context-path=/

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/petclinic_jakartaee_liberty
spring.datasource.username=petclinic_jakartaee
spring.datasource.password=petclinic_jakartaeepwd
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Initialize data
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
