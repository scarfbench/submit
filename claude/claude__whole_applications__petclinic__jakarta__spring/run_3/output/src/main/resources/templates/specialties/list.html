<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div class="container">
    <h1>Specialties</h1>
    <form th:action="@{/specialties}" method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Search specialties..." th:value="${search}"/>
            <button class="btn btn-outline-primary" type="submit">Search</button>
            <a th:href="@{/specialties}" class="btn btn-outline-secondary">Clear</a>
        </div>
    </form>
    <table class="table table-striped">
        <thead><tr><th>Name</th></tr></thead>
        <tbody>
        <tr th:each="specialty : ${specialties}">
            <td><a th:href="@{/specialties/{id}(id=${specialty.id})}" th:text="${specialty.name}"></a></td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(specialties)}">No specialties found.</p>
</div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
