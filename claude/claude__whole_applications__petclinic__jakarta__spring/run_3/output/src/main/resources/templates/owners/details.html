<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div class="container">
    <h1 th:text="${owner.lastName + ', ' + owner.firstName}">Owner</h1>
    <div class="card mt-3">
        <div class="card-body">
            <p><strong>Address:</strong> <span th:text="${owner.address + ' ' + owner.houseNumber + ', ' + owner.zipCode + ' ' + owner.city}"></span></p>
            <p><strong>Phone:</strong> <span th:text="${owner.phoneNumber}"></span></p>
            <p><strong>Email:</strong> <span th:text="${owner.email}"></span></p>
        </div>
    </div>
    <h3 class="mt-3">Pets</h3>
    <table class="table table-striped" th:if="${pets != null and !pets.isEmpty()}">
        <thead><tr><th>Name</th><th>Type</th><th>Birth Date</th></tr></thead>
        <tbody>
        <tr th:each="pet : ${pets}">
            <td th:text="${pet.name}"></td>
            <td th:text="${pet.type.name}"></td>
            <td th:text="${pet.birthDate}"></td>
        </tr>
        </tbody>
    </table>
    <p th:if="${pets == null or pets.isEmpty()}">No pets found.</p>
    <a th:href="@{/owners}" class="btn btn-secondary mt-3">Back to Owners</a>
</div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
