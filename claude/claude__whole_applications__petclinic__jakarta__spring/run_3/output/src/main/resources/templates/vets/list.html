<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div class="container">
    <h1>Veterinarians</h1>
    <form th:action="@{/vets}" method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Search vets..." th:value="${search}"/>
            <button class="btn btn-outline-primary" type="submit">Search</button>
            <a th:href="@{/vets}" class="btn btn-outline-secondary">Clear</a>
        </div>
    </form>
    <table class="table table-striped">
        <thead><tr><th>Name</th><th>Specialties</th></tr></thead>
        <tbody>
        <tr th:each="vet : ${vets}">
            <td><a th:href="@{/vets/{id}(id=${vet.id})}" th:text="${vet.lastName + ', ' + vet.firstName}"></a></td>
            <td th:text="${vet.specialtiesAsString}"></td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(vets)}">No veterinarians found.</p>
</div>
<script th:src="@{/webjars/bootstrap/5.2.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
