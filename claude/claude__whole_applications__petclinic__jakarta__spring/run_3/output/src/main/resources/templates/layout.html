<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} ?: 'Petclinic'">Petclinic</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.2.3/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.4.0/css/all.min.css}"/>
    <style>
        body { padding-top: 70px; }
        .navbar-brand { font-weight: bold; }
    </style>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="fas fa-paw"></i> Petclinic
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/owners}">Owners</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/petTypes}">Pet Types</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/vets}">Veterinarians</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/specialties}">Specialties</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/info}">Info</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
