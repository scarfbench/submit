spring.application.name=petclinic
server.port=8080
server.servlet.context-path=/petclinic

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/petclinic_jakartaee_liberty
spring.datasource.username=petclinic_jakartaee
spring.datasource.password=petclinic_jakartaeepwd
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.defer-datasource-initialization=true

# Initialize database
spring.sql.init.mode=always
spring.sql.init.platform=postgresql

# Thymeleaf
spring.thymeleaf.cache=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.org.woehlke.jakartaee.petclinic=INFO
