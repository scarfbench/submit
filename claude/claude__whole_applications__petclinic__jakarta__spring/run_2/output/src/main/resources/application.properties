# Spring Boot Application Configuration
spring.application.name=petclinic
server.servlet.context-path=/petclinic
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/petclinic_jakartaee_liberty
spring.datasource.username=petclinic_jakartaee
spring.datasource.password=petclinic_jakartaeepwd
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.defer-datasource-initialization=true

# Initialize database with data.sql after Hibernate schema creation
spring.sql.init.mode=always

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.org.woehlke.jakartaee.petclinic=INFO
logging.level.org.springframework.web=INFO
