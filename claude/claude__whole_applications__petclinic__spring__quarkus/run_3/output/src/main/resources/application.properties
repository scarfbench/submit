# Quarkus PetClinic Configuration

# Datasource configuration - H2 in-memory database
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:petclinic;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=import.sql

# HTTP configuration
quarkus.http.port=8080

# Static resources - serve from META-INF/resources
quarkus.http.enable-compression=true

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.hibernate".level=INFO

# Health endpoint
quarkus.smallrye-health.root-path=/actuator/health
