{#include tags/layout}
  <h2>{#if isNew}New {/if}Pet</h2>
  {#if error??}
  <div class="alert alert-danger">{error}</div>
  {/if}
  <form class="form-horizontal" method="post">
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label">Owner</label>
        <div class="col-sm-10">
          <span>{owner.firstName} {owner.lastName}</span>
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Name</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="name" value="{pet.name}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Birth Date</label>
        <div class="col-sm-10">
          <input class="form-control" type="date" name="birthDate" value="{pet.birthDate}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Type</label>
        <div class="col-sm-10">
          <select class="form-control" name="type">
            {#for t in types}
            <option value="{t.name}" {#if pet.type?? && pet.type.name == t.name}selected{/if}>{t.name}</option>
            {/for}
          </select>
        </div>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button class="btn btn-primary" type="submit">
          {#if isNew}Add Pet{#else}Update Pet{/if}
        </button>
      </div>
    </div>
  </form>
{/include}
