{#include tags/layout}
  <h2>New Visit</h2>

  {#if error??}
  <div class="alert alert-danger">{error}</div>
  {/if}

  <b>Pet</b>
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Name</th>
        <th>Birth Date</th>
        <th>Type</th>
        <th>Owner</th>
      </tr>
    </thead>
    <tr>
      <td>{pet.name}</td>
      <td>{pet.birthDate}</td>
      <td>{pet.type}</td>
      <td>{owner.firstName} {owner.lastName}</td>
    </tr>
  </table>

  <form class="form-horizontal" method="post">
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label">Date</label>
        <div class="col-sm-10">
          <input class="form-control" type="date" name="date" value="{visit.date}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Description</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="description" value="{visit.description}" />
        </div>
      </div>
    </div>

    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button class="btn btn-primary" type="submit">Add Visit</button>
      </div>
    </div>
  </form>

  <br />
  <b>Previous Visits</b>
  <table class="table table-striped">
    <tr>
      <th>Date</th>
      <th>Description</th>
    </tr>
    {#for v in pet.visits}
    <tr>
      <td>{v.date}</td>
      <td>{v.description}</td>
    </tr>
    {/for}
  </table>
{/include}
