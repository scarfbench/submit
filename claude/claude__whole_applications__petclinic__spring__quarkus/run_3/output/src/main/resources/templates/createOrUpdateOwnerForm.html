{#include tags/layout}
  <h2>Owner</h2>
  {#if error??}
  <div class="alert alert-danger">{error}</div>
  {/if}
  <form class="form-horizontal" id="add-owner-form" method="post">
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label">First Name</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="firstName" value="{owner.firstName}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Last Name</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="lastName" value="{owner.lastName}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Address</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="address" value="{owner.address}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">City</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="city" value="{owner.city}" />
        </div>
      </div>
      <div class="form-group">
        <label class="col-sm-2 control-label">Telephone</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="telephone" value="{owner.telephone}" />
        </div>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button class="btn btn-primary" type="submit">
          {#if isNew}Add Owner{#else}Update Owner{/if}
        </button>
      </div>
    </div>
  </form>
{/include}
