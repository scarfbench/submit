{#include layout.html}
{#body}
  <h2>Find Owners</h2>

  <form action="/owners" method="get" class="form-horizontal">
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label">Last name </label>
        <div class="col-sm-10">
          <input class="form-control" type="text" name="lastName" value="{owner.lastName ?: ''}" />
          {#if noResults??}
          <span class="help-inline">
            <div class="text-danger">has not been found</div>
          </span>
          {/if}
        </div>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button type="submit" class="btn btn-primary">Find Owner</button>
      </div>
    </div>
  </form>

  <br />
  <a href="/owners/new" class="btn btn-primary">Add Owner</a>
{/body}
{/include}
