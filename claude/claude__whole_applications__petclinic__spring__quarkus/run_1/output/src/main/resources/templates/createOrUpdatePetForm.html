{#include layout.html}
{#body}
  <h2>{#if isNew}New Pet{#else}Pet{/if}</h2>
  <b>{owner.firstName} {owner.lastName}</b>
  <form action="{#if isNew}/owners/{owner.id}/pets/new{#else}/owners/{owner.id}/pets/{pet.id}/edit{/if}" method="post" class="form-horizontal">
    <div class="form-group has-feedback">
      <label class="col-sm-2 control-label">Name</label>
      <div class="col-sm-10">
        <input type="text" class="form-control" name="name" value="{pet.name ?: ''}" />
      </div>
    </div>
    <div class="form-group has-feedback">
      <label class="col-sm-2 control-label">Birth Date</label>
      <div class="col-sm-10">
        <input type="date" class="form-control" name="birthDate" value="{pet.birthDate ?: ''}" />
      </div>
    </div>
    <div class="form-group has-feedback">
      <label class="col-sm-2 control-label">Type</label>
      <div class="col-sm-10">
        <select class="form-control" name="type">
          {#for type in types}
          <option value="{type.id}" {#if pet.type != null}{#if pet.type.id == type.id}selected{/if}{/if}>{type.name}</option>
          {/for}
        </select>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button class="btn btn-primary" type="submit">{#if isNew}Add Pet{#else}Update Pet{/if}</button>
      </div>
    </div>
  </form>
{/body}
{/include}
