<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" type="image/x-icon" href="/resources/images/favicon.png">
  <title>PetClinic :: a Quarkus demonstration</title>
  <link rel="stylesheet" href="/resources/css/petclinic.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark" role="navigation">
    <div class="container-fluid">
      <a class="navbar-brand" href="/"><span></span></a>
      <div class="collapse navbar-collapse" id="main-navbar" style>
        <ul class="nav navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {#if activeMenu == 'home'}active{/if}" href="/" title="home page">
              <span class="fa fa-home"></span>
              <span>Home</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {#if activeMenu == 'owners'}active{/if}" href="/owners/find" title="find owners">
              <span class="fa fa-search"></span>
              <span>Find owners</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {#if activeMenu == 'vets'}active{/if}" href="/vets.html" title="veterinarians">
              <span class="fa fa-th-list"></span>
              <span>Veterinarians</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {#if activeMenu == 'error'}active{/if}" href="/oups" title="trigger a RuntimeException to see how it is handled">
              <span class="fa fa-exclamation-triangle"></span>
              <span>Error</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="container xd-container">
      {#insert body}No body{/insert}
      <br />
      <br />
      <div class="container">
        <div class="row">
          <div class="col-12 text-center">
            <img src="/resources/images/spring-logo.svg" alt="Logo" class="logo">
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
