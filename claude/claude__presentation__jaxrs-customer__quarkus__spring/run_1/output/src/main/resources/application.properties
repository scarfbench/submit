# Spring Boot Configuration for JAX-RS Customer Application

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:h2:mem:customer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jersey (JAX-RS) Configuration
spring.jersey.application-path=/webapi

# JSF Configuration
# MyFaces configuration
joinfaces.myfaces.default-suffix=.xhtml
joinfaces.myfaces.project-stage=Development
server.servlet.jsp.init-parameters.state-saving-method=server

# Logging Configuration
logging.level.root=INFO
logging.level.spring.examples.tutorial=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# Jackson JSON Configuration
spring.jackson.serialization.indent-output=true
