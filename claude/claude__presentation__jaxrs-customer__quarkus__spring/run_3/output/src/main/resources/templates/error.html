<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring Boot Tutorial: REST Customer example - Error</title>
    <meta charset="UTF-8"/>
    <style>
        .error { color: red; padding: 10px; border: 1px solid red; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Error</h1>
    <div class="error" th:if="${errorMessage}">
        <p th:text="${errorMessage}">An error occurred</p>
    </div>
    <div class="error" th:unless="${errorMessage}">
        <p>An unexpected error occurred</p>
    </div>
    <br/>
    <a href="/">Return to Home</a>
</body>
</html>
