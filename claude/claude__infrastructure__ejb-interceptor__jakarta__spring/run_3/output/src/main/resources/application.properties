# Spring Boot Application Configuration
# Migrated from Jakarta EE Open Liberty server.xml

# Server Configuration (replaces Open Liberty httpEndpoint)
server.port=8080

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging Configuration (replaces Open Liberty logging)
logging.level.root=INFO
logging.level.com.example.interceptor=INFO
logging.level.interceptor.ejb.HelloInterceptor=INFO

# Application Name
spring.application.name=interceptor
