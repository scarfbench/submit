# Quarkus datasource configuration (H2 in-memory)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate ORM configuration
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# HTTP configuration
quarkus.http.port=8080

# Show verbose errors in REST responses
quarkus.http.show-default-error-page=true
quarkus.log.category."io.quarkus.resteasy.reactive".level=DEBUG
quarkus.log.category."org.jboss.resteasy.reactive".level=DEBUG
