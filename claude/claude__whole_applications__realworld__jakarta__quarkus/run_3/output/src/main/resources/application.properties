# Quarkus configuration for RealWorld API

# HTTP
quarkus.http.port=8080

# Datasource configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRESQL_USER:postgres_user}
quarkus.datasource.password=${POSTGRESQL_PW:S3cret}
quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRESQL_HOSTNAME:localhost}:${POSTGRESQL_PORT:5432}/${POSTGRESQL_DBNAME:postgres_db}

# Hibernate ORM
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# JWT custom config
jwt.issuer=users-service
jwt.expiration.time.minutes=10
jwt.secret=secret123

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=3600
