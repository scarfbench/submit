# Spring Boot Application Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:h2:mem:customer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Jersey Configuration for JAX-RS
spring.jersey.application-path=/webapi

# JSF Configuration
# Note: JSF configuration will be done via ServletRegistrationBean in Java config

# Logging Configuration
logging.level.root=INFO
logging.level.spring.tutorial.rsvp=DEBUG

# Development Configuration
spring.devtools.restart.enabled=false
