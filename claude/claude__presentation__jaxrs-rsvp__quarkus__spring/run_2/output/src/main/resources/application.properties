# Spring DataSource Configuration
spring.datasource.url=jdbc:h2:mem:customer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Server Configuration
server.port=8080
server.servlet.context-path=/

# JSF Configuration (via Spring Boot)
spring.mvc.view.prefix=/META-INF/resources/
spring.mvc.view.suffix=.xhtml
joinfaces.faces-servlet-url-mappings=*.xhtml
joinfaces.project-stage=Development
joinfaces.facelets.skip-comments=true
joinfaces.facelets.refresh-period=-1
joinfaces.state-saving-method=server

# Logging Configuration
logging.level.root=INFO
logging.level.spring.examples.tutorial=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# H2 Console (optional, for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
