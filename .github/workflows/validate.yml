name: Scarf Validate

# Stage 2 of 3. Triggered by completion of Scarf Package. Runs from the
# default branch with access to HARNESS_TOKEN. Fans out validation across
# shards for parallelism, then consolidates into a leaderboard.
on:
  workflow_run:
    workflows: ["Scarf Package"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  discover:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Download submission payload
        uses: actions/download-artifact@v4
        with:
          name: submission-payload
          path: submissions
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: set-matrix
        shell: bash
        env:
          CHUNK_SIZE: 8
        run: |
          set -euo pipefail
          mapfile -t dirs < <(
            find submissions -type f -path '*/run_*/metadata.json' -printf '%h\n' \
              | xargs -n1 dirname \
              | sort -u
          )
          if [ "${#dirs[@]}" -eq 0 ]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          json=$(printf '%s\n' "${dirs[@]}" \
            | jq -R . \
            | jq -sc --argjson n "${CHUNK_SIZE}" '
                {include: [ _nwise($n) | {dirs: (. | join("\n"))} ]}
              ')
          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo "Sharded ${#dirs[@]} roots into $(jq '.include | length' <<<"$json") chunk(s)"

  validate:
    name: Validate chunk ${{ strategy.job-index }}
    needs: discover
    if: needs.discover.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Download submission payload
        uses: actions/download-artifact@v4
        with:
          name: submission-payload
          path: submissions
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout eval harness
        uses: actions/checkout@v4
        with:
          repository: scarfbench/scarfbench-eval-harness
          token: ${{ secrets.HARNESS_TOKEN }}
          path: harness
          ref: main
          persist-credentials: false

      - name: Scrub harness credentials
        run: |
          set -euo pipefail
          rm -rf harness/.git
          if grep -rq 'ghp_\|github_pat_' harness; then
            echo "ERROR: token-like string found in harness checkout" >&2
            exit 1
          fi

      - name: Install scarfbench-cli
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/scarfbench/scarf/releases/latest/download/scarfbench-cli-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          scarf --version

      - name: Validate
        env:
          DIRS: ${{ matrix.dirs }}
        run: |
          set -euo pipefail
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            echo "::group::$dir"
            scarf validate \
              --conversions-dir "$dir" \
              --validations-dir harness \
              --timeout 5 \
              --dont-rerun
            echo "::endgroup::"
          done <<< "$DIRS"

      - name: Package shard output
        if: always()
        env:
          DIRS: ${{ matrix.dirs }}
        run: |
          set -euo pipefail
          mkdir -p shard
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            mkdir -p "shard/$dir"
            rsync -a --prune-empty-dirs \
                  --include='*/' \
                  --include='metadata.json' \
                  --include='run.log' \
                  --exclude='*' \
                  "$dir/" \
                  "shard/$dir/"
          done <<< "$DIRS"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shard-${{ strategy.job-index }}
          path: shard/
          if-no-files-found: warn

  leaderboard:
    name: Generate leaderboard
    needs: [discover, validate]
    if: always() && needs.validate.result != 'cancelled' && needs.discover.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    steps:
      - name: Download submission payload
        uses: actions/download-artifact@v4
        with:
          name: submission-payload
          path: submissions
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout eval harness
        uses: actions/checkout@v4
        with:
          repository: scarfbench/scarfbench-eval-harness
          token: ${{ secrets.HARNESS_TOKEN }}
          path: harness
          ref: main
          persist-credentials: false

      - name: Scrub harness credentials
        run: |
          rm -rf harness/.git

      - uses: actions/download-artifact@v4
        with:
          pattern: shard-*
          merge-multiple: true
          path: shard-out

      - name: Overlay shard run.log files onto tree
        run: |
          # shard-out contains paths like submissions/<vendor>/.../run_N/run.log
          # rsync into ./ so it merges with the payload at submissions/
          if [ -d shard-out ]; then
            rsync -a shard-out/ ./
          fi

      - name: Install scarfbench-cli
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/scarfbench/scarf/releases/latest/download/scarfbench-cli-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          scarf --version

      - name: Generate leaderboard
        run: |
          set -euo pipefail
          for vendor in submissions/*/; do
            [ -d "$vendor" ] || continue
            echo "::group::Leaderboard for $vendor"
            scarf validate \
              --conversions-dir "$vendor" \
              --validations-dir harness \
              --dont-rerun \
              --leaderboard-out
            echo "::endgroup::"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: leaderboard
          path: submissions/*/*__*.json
          if-no-files-found: warn

      - name: Read PR metadata
        id: prmeta
        run: |
          set -euo pipefail
          number=$(cat submissions/pr-meta/number)
          sha=$(cat submissions/pr-meta/sha)
          echo "number=$number" >> "$GITHUB_OUTPUT"
          echo "sha=$sha"       >> "$GITHUB_OUTPUT"

      - name: Publish leaderboard to site
        env:
          SITE_TOKEN: ${{ secrets.SITE_TOKEN }}
          PR_NUMBER: ${{ steps.prmeta.outputs.number }}
          PR_SHA: ${{ steps.prmeta.outputs.sha }}
        run: |
          set -euo pipefail
          git clone --depth 1 \
            "https://x-access-token:${SITE_TOKEN}@github.com/scarfbench/site.git" \
            site
          mkdir -p site/public/results
          cp submissions/*/*__*.json site/public/results/
          cd site
          git config user.name  "scarfbench-bot"
          git config user.email "scarfbench-bot@users.noreply.github.com"
          git add public/results
          if git diff --cached --quiet; then
            echo "No leaderboard changes to publish."
            exit 0
          fi
          git commit -m "Update leaderboard from scarfbench-submit#${PR_NUMBER} (${PR_SHA:0:7})"
          git push origin HEAD:master

      - name: Forward PR metadata
        run: |
          mkdir -p pr-meta
          cp submissions/pr-meta/number pr-meta/number

      - uses: actions/upload-artifact@v4
        with:
          name: pr-meta
          path: pr-meta/
          if-no-files-found: error
