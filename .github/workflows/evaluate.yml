name: Scarf Validate

on:
  pull_request:
    paths:
      - '**/run_*/**'
      - '**/metadata.json'
      - '.github/workflows/evaluate.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  discover:
    if: startsWith(github.head_ref, 'submission-')
    name: Discover Conversion Roots
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t dirs < <(
            find . -type f -path '*/run_*/metadata.json' -printf '%h\n' \
              | xargs -n1 dirname \
              | sort -u \
              | sed 's|^\./||'
          )
          if [ "${#dirs[@]}" -eq 0 ]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          json=$(printf '%s\n' "${dirs[@]}" | jq -R . | jq -s '{include: map({dir: .})}')
          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo "$json" | jq .

  validate:
    name: Validate ${{ matrix.dir }}
    needs: discover
    if: needs.discover.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: submissions

      - name: Checkout eval harness
        uses: actions/checkout@v4
        with:
          repository: scarfbench/scarfbench-eval-harness
          path: harness
          ref: main

      - name: Install scarfbench-cli
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/scarfbench/scarf/releases/latest/download/scarfbench-cli-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          scarf --version

      - name: Validate
        run: |
          # NOTE: --dont-rerun is a TEMPORARY testing mode. Submissions today ship
          # with pre-baked run.log files. Remove --dont-rerun once real submissions
          # are expected to run `make test` fresh in CI.
          scarf validate \
            --conversions-dir "submissions/${{ matrix.dir }}" \
            --validations-dir harness \
            --timeout 5 \
            --dont-rerun

      - name: Package shard output
        if: always()
        run: |
          mkdir -p shard
          rsync -a --prune-empty-dirs \
                --include='*/' \
                --include='metadata.json' \
                --include='run.log' \
                --exclude='*' \
                "submissions/${{ matrix.dir }}/" \
                "shard/submissions/${{ matrix.dir }}/"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shard-${{ strategy.job-index }}
          path: shard/
          if-no-files-found: warn

  leaderboard:
    name: Generate leaderboard and comment on PR
    needs: validate
    if: always() && needs.validate.result != 'cancelled' && needs.discover.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: submissions

      - name: Checkout eval harness
        uses: actions/checkout@v4
        with:
          repository: scarfbench/scarfbench-eval-harness
          path: harness
          ref: main

      - uses: actions/download-artifact@v4
        with:
          pattern: shard-*
          merge-multiple: true
          path: shard-out

      - name: Overlay shard metadata onto tree
        run: |
          if [ -d shard-out ]; then
            rsync -a shard-out/ ./
          fi

      - name: Install scarfbench-cli
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/scarfbench/scarf/releases/latest/download/scarfbench-cli-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          scarf --version

      - name: Generate leaderboard(s)
        run: |
          set -euo pipefail
          roots=$(find submissions -type f -path '*/run_*/metadata.json' -printf '%h\n' \
                    | xargs -n1 dirname \
                    | sort -u)
          if [ -z "$roots" ]; then
            echo "No conversion roots found; nothing to leaderboard."
            exit 0
          fi
          while read -r root; do
            echo "::group::Leaderboard for $root"
            scarf validate \
              --conversions-dir "$root" \
              --validations-dir harness \
              --dont-rerun \
              --leaderboard-out
            echo "::endgroup::"
          done <<< "$roots"

      - uses: actions/upload-artifact@v4
        with:
          name: leaderboard
          path: submissions/**/*__*.json
          if-no-files-found: warn

      - name: Comment done on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- scarfbench-leaderboard -->';
            const body = `${marker}\ndone!`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const existing = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const prior = existing.find(c => c.body && c.body.startsWith(marker));
            if (prior) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: prior.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
