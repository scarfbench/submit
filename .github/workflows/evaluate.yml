name: Scarf Package

# Stage 1 of 3. Triggered by PRs (including from forks). Runs in the untrusted
# PR context with NO secrets. Packages the full submission tree as an artifact
# for the trusted Scarf Validate workflow to consume via workflow_run.
on:
  pull_request:
    branches: [submission]
    paths:
      - '**/run_*/**'
      - '**/metadata.json'
      - '.github/workflows/evaluate.yml'

permissions:
  contents: read

jobs:
  package:
    name: Package submission
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: submissions
          persist-credentials: false

      - name: Strip .git and record PR metadata
        run: |
          set -euo pipefail
          rm -rf submissions/.git submissions/.github
          mkdir -p submissions/.pr-meta
          echo "${{ github.event.pull_request.number }}" > submissions/.pr-meta/number
          echo "${{ github.event.pull_request.head.sha }}" > submissions/.pr-meta/sha

      - uses: actions/upload-artifact@v4
        with:
          name: submission-payload
          path: submissions/
          include-hidden-files: true
          if-no-files-found: error
