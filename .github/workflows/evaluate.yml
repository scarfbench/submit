name: Scarf Validate

on:
  pull_request:
    branches: [submission]
    paths:
      - '**/run_*/**'
      - '**/metadata.json'
      - '.github/workflows/evaluate.yml'

permissions:
  contents: read

jobs:
  discover:
    name: Discover Conversion Roots
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        shell: bash
        env:
          CHUNK_SIZE: 8
        run: |
          set -euo pipefail
          mapfile -t dirs < <(
            find . -type f -path '*/run_*/metadata.json' -printf '%h\n' \
              | xargs -n1 dirname \
              | sort -u \
              | sed 's|^\./||'
          )
          if [ "${#dirs[@]}" -eq 0 ]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Compact JSON (-c) — $GITHUB_OUTPUT can't take multi-line values.
          # Chunk N roots per shard so we stay under GitHub's 256-job matrix cap.
          json=$(printf '%s\n' "${dirs[@]}" \
            | jq -R . \
            | jq -sc --argjson n "${CHUNK_SIZE}" '
                {include: [ _nwise($n) | {dirs: (. | join("\n"))} ]}
              ')
          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo "Sharded ${#dirs[@]} roots into $(jq '.include | length' <<<"$json") chunk(s)"

  validate:
    name: Validate chunk ${{ strategy.job-index }}
    needs: discover
    if: needs.discover.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: submissions

      - name: Checkout eval harness
        uses: actions/checkout@v4
        with:
          repository: scarfbench/scarfbench-eval-harness
          path: harness
          ref: main

      - name: Install scarfbench-cli
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/scarfbench/scarf/releases/latest/download/scarfbench-cli-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          scarf --version

      - name: Validate
        env:
          DIRS: ${{ matrix.dirs }}
        run: |
          set -euo pipefail
          # NOTE: --dont-rerun is a TEMPORARY testing mode. Submissions today ship
          # with pre-baked run.log files. Remove --dont-rerun once real submissions
          # are expected to run `make test` fresh in CI.
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            echo "::group::$dir"
            scarf validate \
              --conversions-dir "submissions/$dir" \
              --validations-dir harness \
              --timeout 5 \
              --dont-rerun
            echo "::endgroup::"
          done <<< "$DIRS"

      - name: Package shard output
        if: always()
        env:
          DIRS: ${{ matrix.dirs }}
        run: |
          set -euo pipefail
          mkdir -p shard
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            mkdir -p "shard/submissions/$dir"
            rsync -a --prune-empty-dirs \
                  --include='*/' \
                  --include='metadata.json' \
                  --include='run.log' \
                  --exclude='*' \
                  "submissions/$dir/" \
                  "shard/submissions/$dir/"
          done <<< "$DIRS"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shard-${{ strategy.job-index }}
          path: shard/
          if-no-files-found: warn

  leaderboard:
    name: Generate leaderboard and comment on PR
    needs: validate
    if: always() && needs.validate.result != 'cancelled' && needs.discover.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: submissions

      - name: Checkout eval harness
        uses: actions/checkout@v4
        with:
          repository: scarfbench/scarfbench-eval-harness
          path: harness
          ref: main

      - uses: actions/download-artifact@v4
        with:
          pattern: shard-*
          merge-multiple: true
          path: shard-out

      - name: Overlay shard metadata onto tree
        run: |
          if [ -d shard-out ]; then
            rsync -a shard-out/ ./
          fi

      - name: Install scarfbench-cli
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/scarfbench/scarf/releases/latest/download/scarfbench-cli-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          scarf --version

      - name: Generate leaderboard(s)
        run: |
          set -euo pipefail
          roots=$(find submissions -type f -path '*/run_*/metadata.json' -printf '%h\n' \
                    | xargs -n1 dirname \
                    | sort -u)
          if [ -z "$roots" ]; then
            echo "No conversion roots found; nothing to leaderboard."
            exit 0
          fi
          while read -r root; do
            echo "::group::Leaderboard for $root"
            scarf validate \
              --conversions-dir "$root" \
              --validations-dir harness \
              --dont-rerun \
              --leaderboard-out
            echo "::endgroup::"
          done <<< "$roots"

      - uses: actions/upload-artifact@v4
        with:
          name: leaderboard
          path: submissions/**/*__*.json
          if-no-files-found: warn

      # Record PR number for the publish workflow to pick up.
      - name: Record PR number
        run: |
          mkdir -p pr-meta
          echo "${{ github.event.pull_request.number }}" > pr-meta/number

      - uses: actions/upload-artifact@v4
        with:
          name: pr-meta
          path: pr-meta/
          if-no-files-found: error
